            ${event.location ? `<div>${esc(event.location)}</div>` : ''}
          </div>
          ${event.note ? `<p class="mt-3 text-on-surface-variant italic text-sm leading-relaxed max-w-md">${esc(event.note)}</p>` : ''}
        </div>

        <!-- Actions — left-aligned as per Stitch -->
        <div class="flex flex-col gap-3 ml-2 md:ml-12">
          <button id="honoree-yes" class="w-full md:w-auto self-start bg-primary-container text-on-primary-container font-headline font-semibold text-lg py-5 px-10 rounded-lg shadow-[0_0_40px_rgba(167,139,250,0.15)] hover:bg-primary transition-all duration-300 flex items-center justify-between md:min-w-[360px] group">
            <span>ICH BIN DABEI</span>
            <span class="material-symbols-outlined ml-4 opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all">arrow_forward</span>
          </button>
          <button id="honoree-maybe" class="w-full md:w-auto self-start glass-panel text-on-surface-variant font-tech text-xs tracking-[0.15em] uppercase py-4 px-10 rounded-lg hover:bg-surface-container-high/30 hover:text-on-surface transition-colors md:min-w-[360px]">
            ICH MUSS DRÜBER SCHLAFEN
          </button>
        </div>
      </section>

      <!-- Tiny Metadata Footer (bottom-right, 40% opacity) -->
      <div class="w-full text-right px-8 mt-20 opacity-40">
        <div class="glass-panel inline-block p-2 rounded">
          <p class="font-tech text-[8px] tracking-[0.2em] text-on-surface-variant uppercase text-right leading-relaxed">
            EVT_ID: 0x${esc(event.id.slice(0, 4).toUpperCase())}<br>
            TS: ${Math.floor(Date.now() / 1000)}
          </p>
        </div>
      </div>
    `;

    // Wire play/pause
    const playBtn = document.getElementById('honoree-play');
    const audio = document.getElementById('honoree-audio');
    const stage = document.getElementById('honoree-stage');
    let sceneIdx = 0;
    if (playBtn && audio && scenes.length > 0) {
      playBtn.addEventListener('click', () => {
        audio.play().catch(() => {});
        playBtn.style.display = 'none';
        const slides = stage.querySelectorAll('[data-scene-idx]');
        const durationPerScene = Math.max(5, Math.min(45, (song?.duration_sec || 40) / scenes.length));
        const rotate = setInterval(() => {
          slides[sceneIdx].style.opacity = '0';
          sceneIdx = (sceneIdx + 1) % scenes.length;
          slides[sceneIdx].style.opacity = '1';
          const counter = document.getElementById('scene-counter');
          if (counter) counter.textContent = `${sceneIdx + 1} / ${scenes.length}`;
        }, durationPerScene * 1000);
        audio.addEventListener('ended', () => clearInterval(rotate));
      });
    }

    // Wire response buttons — create a non-wizard response directly (honoree is not a wizard participant)
    document.getElementById('honoree-yes')?.addEventListener('click', () => recordHonoreeResponse(event, 'yes'));
    document.getElementById('honoree-maybe')?.addEventListener('click', () => recordHonoreeResponse(event, 'maybe'));
  }

  function formatDuration(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  async function recordHonoreeResponse(event, response) {
    const honoreeName = event.guest_of_honor || 'Ehrengast';
    await sb.from('kreis_responses').upsert(
      { event_id: event.id, user_name: honoreeName, response, note: response === 'yes' ? 'Via Einladungs-Link dabei' : 'Denkt drüber nach' },
      { onConflict: 'event_id,user_name' },
    );
    const btn = document.getElementById(`honoree-${response}`);
    if (btn) {
      btn.innerHTML = response === 'yes'
        ? '<span>DABEI ✓</span>'
        : '<span class="uppercase">DANKE, WIR MELDEN UNS</span>';
      btn.disabled = true;
    }
  }

  // ============================
  // V3: WIZARD FLOW (6 Steps)
  // ============================
  const WIZARD_STEPS = ['rsvp', 'name', 'photo', 'story', 'rendering', 'done'];

  async function renderWizard(event) {
    hideStickyShare();
    // State — persisted in sessionStorage to survive reload during wizard
    const key = `kreis_wizard_${event.id}`;
    let state = {};
    try { state = JSON.parse(sessionStorage.getItem(key) || '{}'); } catch { state = {}; }
    state = Object.assign({ step: 0, response: null, name: getName(), photo_path: null, story: '', autoRenderTriggered: false }, state);
    const saveState = () => sessionStorage.setItem(key, JSON.stringify(state));

    const renderStep = () => {
      const stepId = WIZARD_STEPS[state.step];
      const progressPct = Math.round(((state.step) / (WIZARD_STEPS.length - 1)) * 100);

      $app.className = 'w-full max-w-md px-6 py-8 flex flex-col gap-8 relative z-10 min-h-screen items-center';

      const progressBar = `<div class="progress-bar-thin" style="width:${progressPct}%"></div>`;
      const pill = `<div class="w-full flex justify-center mt-4">
        <div class="glass-pill px-4 py-1.5 font-tech text-[10px] text-primary uppercase">STEP ${state.step + 1} / ${WIZARD_STEPS.length}</div>
      </div>`;

      if (stepId === 'rsvp') {
        $app.innerHTML = progressBar + pill + `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-10">
            <h1 class="font-headline text-5xl font-bold text-center leading-tight">Bist du dabei?</h1>
            <div class="w-full space-y-3">
              ${[['yes','Dabei'],['maybe','Vielleicht'],['no','Nicht dabei']].map(([v,l]) => `
                <button data-rsvp="${v}" class="wizard-rsvp-btn w-full ${state.response === v ? 'glass-panel-selected' : 'glass-panel'} rounded-xl p-6 text-left flex items-center justify-between transition-all duration-300">
                  <span class="font-headline text-2xl font-medium ${state.response === v ? 'text-primary' : 'text-on-surface-variant'}">${l}</span>
                  ${state.response === v ? '<span class="material-symbols-outlined text-primary">check_circle</span>' : ''}
                </button>
              `).join('')}
            </div>
          </div>
          <div class="mt-auto w-full flex justify-between items-center">
            <span class="font-tech text-[10px] text-on-surface-variant/40 uppercase">TAP_TO_SELECT</span>
            <button id="wiz-next" class="${state.response ? 'bg-primary-container text-on-primary-container' : 'glass-panel text-on-surface-variant/40 pointer-events-none'} rounded-full px-6 py-3 font-tech text-[11px] uppercase">WEITER →</button>
          </div>
        `;
        document.querySelectorAll('.wizard-rsvp-btn').forEach((btn) => {
          btn.addEventListener('click', () => { state.response = btn.dataset.rsvp; saveState(); renderStep(); });
        });
        document.getElementById('wiz-next')?.addEventListener('click', () => { if (state.response) { state.step++; saveState(); renderStep(); } });
      }

      else if (stepId === 'name') {
        $app.innerHTML = progressBar + pill + `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-10">
            <h1 class="font-headline text-5xl font-bold text-center leading-tight">Dein Name</h1>
            <input id="wiz-name-input" type="text" value="${esc(state.name)}" autofocus placeholder="z.B. Nino" class="liquid-input w-full text-center font-headline text-4xl py-4 placeholder:text-on-surface-variant/30">
          </div>
          <div class="mt-auto w-full flex justify-between items-center">
            <button id="wiz-back" class="glass-panel rounded-full px-6 py-3 font-tech text-[11px] text-on-surface-variant uppercase">← ZURÜCK</button>
            <button id="wiz-next" class="bg-primary-container text-on-primary-container rounded-full px-6 py-3 font-tech text-[11px] uppercase">WEITER →</button>
          </div>
        `;
        const input = document.getElementById('wiz-name-input');
        input.addEventListener('input', () => { state.name = input.value.trim(); saveState(); });
        document.getElementById('wiz-back')?.addEventListener('click', () => { state.step--; saveState(); renderStep(); });
        document.getElementById('wiz-next')?.addEventListener('click', () => {
          if (!state.name) { input.classList.add('missing'); input.focus(); return; }
          setName(state.name);
          state.step++; saveState(); renderStep();
        });
      }

      else if (stepId === 'photo') {
        $app.innerHTML = progressBar + pill + `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-10">
            <h1 class="font-headline text-5xl font-bold text-center leading-tight">Ein Foto von dir</h1>
            <label for="wiz-photo-input" class="mx-auto block w-[200px] h-[200px] rounded-full glass-panel cursor-pointer flex items-center justify-center hover:bg-surface-container-high/30 transition-colors overflow-hidden relative" id="wiz-photo-zone">
              ${state.photo_preview ? `<img src="${esc(state.photo_preview)}" class="w-full h-full object-cover" />` : `
                <span class="material-symbols-outlined text-primary/50 text-5xl">add_a_photo</span>
              `}
              <input id="wiz-photo-input" type="file" accept="image/jpeg,image/png,image/webp,image/heic" class="hidden">
            </label>
            <p class="font-tech text-[10px] text-on-surface-variant/50 text-center uppercase">JPG · PNG · HEIC · MAX 5MB</p>
            <div id="wiz-photo-feedback" class="text-center"></div>
          </div>
          <div class="mt-auto w-full flex justify-between items-center">
            <button id="wiz-back" class="glass-panel rounded-full px-6 py-3 font-tech text-[11px] text-on-surface-variant uppercase">← ZURÜCK</button>
            <button id="wiz-next" class="${state.photo_path ? 'bg-primary-container text-on-primary-container' : 'glass-panel text-on-surface-variant/40 pointer-events-none'} rounded-full px-6 py-3 font-tech text-[11px] uppercase">WEITER →</button>
          </div>
        `;
        document.getElementById('wiz-photo-input')?.addEventListener('change', async (e) => {
          const file = e.target.files?.[0];
          if (!file) return;
          const fb = document.getElementById('wiz-photo-feedback');
          if (file.size > 5 * 1024 * 1024) { fb.innerHTML = '<span class="text-error text-xs">Zu groß — max 5MB.</span>'; return; }
          fb.innerHTML = '<span class="font-tech text-[10px] text-primary uppercase">UPLOADING...</span>';
          const ext = file.name.split('.').pop() || 'jpg';
          const path = `${event.id}/${state.name || 'guest'}-${crypto.randomUUID()}.${ext}`;
          const { error } = await sb.storage.from('kreis-faces').upload(path, file, { contentType: file.type });
          if (error) { fb.innerHTML = `<span class="text-error text-xs">${esc(error.message)}</span>`; return; }
          await sb.from('kreis_faces').insert({ event_id: event.id, user_name: state.name, storage_path: path, consent_given: true });
          state.photo_path = path;
          state.photo_preview = URL.createObjectURL(file);
          saveState();
          renderStep();
        });
        document.getElementById('wiz-back')?.addEventListener('click', () => { state.step--; saveState(); renderStep(); });
        document.getElementById('wiz-next')?.addEventListener('click', () => { if (state.photo_path) { state.step++; saveState(); renderStep(); } });
      }

      else if (stepId === 'story') {
        const honoree = event.guest_of_honor;
        const placeholder = honoree
          ? `Euer erstes gemeinsames Konzert mit ${honoree}, ein Insider-Witz, warum du's mit ihr/ihm feiern willst...`
          : 'Warum willst du dabei sein? Insider, Vorfreude, was dich daran reizt...';
        $app.innerHTML = progressBar + pill + `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-8">
            <h1 class="font-headline text-4xl font-bold text-center leading-tight">
              ${honoree ? `Erzähl uns was über <span class="text-primary">${esc(honoree)}</span>` : 'Erzähl uns was'}
            </h1>
            <textarea id="wiz-story-input" class="liquid-input w-full min-h-[180px] py-3 resize-none text-base italic placeholder:text-on-surface-variant/30" placeholder="${esc(placeholder)}">${esc(state.story)}</textarea>
            <p class="font-tech text-[10px] text-on-surface-variant/40 text-center uppercase">OPTIONAL · wird zu Lyrics + Scenes</p>
          </div>
          <div class="mt-auto w-full flex justify-between items-center gap-3">
            <button id="wiz-back" class="glass-panel rounded-full px-6 py-3 font-tech text-[11px] text-on-surface-variant uppercase">← ZURÜCK</button>
            <button id="wiz-skip" class="glass-panel rounded-full px-5 py-3 font-tech text-[10px] text-on-surface-variant uppercase">ÜBERSPRINGEN</button>
            <button id="wiz-next" class="bg-primary-container text-on-primary-container rounded-full px-6 py-3 font-tech text-[11px] uppercase">FERTIG →</button>
          </div>
        `;
        const ta = document.getElementById('wiz-story-input');
        ta.addEventListener('input', () => { state.story = ta.value; saveState(); });
        document.getElementById('wiz-back')?.addEventListener('click', () => { state.step--; saveState(); renderStep(); });
        document.getElementById('wiz-skip')?.addEventListener('click', async () => { state.story = ''; saveState(); await submitWizard(event, state, key); });
        document.getElementById('wiz-next')?.addEventListener('click', async () => { state.story = ta.value; saveState(); await submitWizard(event, state, key); });
      }

      else if (stepId === 'rendering') {
        $app.innerHTML = progressBar + `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-10 relative z-10">
            <h1 class="font-headline text-5xl font-bold text-center leading-tight">Wir basteln<br>deinen Film</h1>
            <div class="glass-panel rounded-xl p-6 space-y-4" id="wiz-log">
              <div class="flex items-center justify-between font-tech text-[10px] uppercase">
                <span class="text-on-surface-variant">INITIALIZING_ENVIRONMENT...</span>
                <span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
              </div>
              <div class="flex items-center justify-between font-tech text-[10px] uppercase" id="log-lyrics">
                <span class="text-on-surface-variant">CLAUDE_LYRICS_DRAFTING...</span>
                <span class="material-symbols-outlined text-tertiary text-[18px]">hourglass_empty</span>
              </div>
              <div class="flex items-center justify-between font-tech text-[10px] uppercase opacity-60" id="log-scenes">
                <span class="text-on-surface-variant">GEMINI_SCENE_GENERATION...</span>
                <span class="material-symbols-outlined text-on-surface-variant text-[18px]">pending</span>
              </div>
              <div class="flex items-center justify-between font-tech text-[10px] uppercase opacity-40" id="log-audio">
                <span class="text-on-surface-variant">AUDIO_SYNTHESIS_PIPELINE...</span>
                <span class="material-symbols-outlined text-on-surface-variant text-[18px]">pending</span>
              </div>
            </div>
            <p class="font-tech text-[10px] text-on-surface-variant/60 text-center uppercase">
              EST. 1-3 MIN · YOU CAN CLOSE THE TAB
            </p>
          </div>
        `;
        // Poll for generated scenes/song to update log
        pollWizardProgress(event.id, () => { state.step++; saveState(); renderStep(); });
      }

      else if (stepId === 'done') {
        sessionStorage.removeItem(key); // Wizard abgeschlossen, State weg
        $app.innerHTML = `
          <div class="light-leak-fixed-center"></div>
          <div class="flex-grow flex flex-col justify-center w-full space-y-8 relative z-10 pt-20">
            <div class="text-center">
              <span class="material-symbols-outlined text-primary text-[80px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
            </div>
            <h1 class="font-headline text-4xl font-bold text-center leading-tight">Fertig.<br><span class="text-on-surface-variant">Du hörst von uns.</span></h1>
            <div class="glass-panel rounded-xl p-6 mx-auto max-w-sm">
              <p class="text-on-surface-variant text-sm leading-relaxed">Dein Teil ist gespeichert. Sobald genug Freunde mitgemacht haben, wird der Einladungs-Film erstellt und an ${event.guest_of_honor ? esc(event.guest_of_honor) : 'alle'} geschickt.</p>
            </div>
            <div class="flex justify-center">
              <a href="?event=${esc(event.id)}" class="glass-pill px-5 py-3 font-tech text-[11px] text-on-surface-variant uppercase hover:text-primary transition-colors">ZUM EVENT</a>
            </div>
          </div>
        `;
      }
    };

    renderStep();
  }

  async function submitWizard(event, state, stateKey) {
    // Save response with story + wizard_completed=true
    const { error } = await sb.from('kreis_responses').upsert(
      {
        event_id: event.id,
        user_name: state.name,
        response: state.response,
        note: null,
        story_text: state.story?.trim() || null,
        wizard_completed: true,
        wizard_step: 6,
      },
      { onConflict: 'event_id,user_name' },
    );
    if (error) {
      alert(`Fehler beim Speichern: ${error.message}`);
      return;
    }

    // Trigger auto-render (fire-and-forget from UI standpoint)
    state.step = 4; // rendering
    state.autoRenderTriggered = true;
    sessionStorage.setItem(stateKey, JSON.stringify(state));

    // Re-render to show rendering step immediately
    renderWizard(event);

    // Fire auto-render in background
    fetch(AUTO_RENDER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'apikey': SUPABASE_KEY,
      },
      body: JSON.stringify({ event_id: event.id, creator_name: state.name }),
    }).catch(() => {});
  }

  async function pollWizardProgress(eventId, onComplete) {
    const logLyrics = () => document.getElementById('log-lyrics');
    const logScenes = () => document.getElementById('log-scenes');
    const logAudio = () => document.getElementById('log-audio');

    let doneCalled = false;
    const markDone = (el) => {
      if (!el) return;
      el.classList.remove('opacity-60', 'opacity-40');
      el.querySelector('.material-symbols-outlined').textContent = 'check_circle';
      el.querySelector('.material-symbols-outlined').style.color = '#cebdff';
      el.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
    };

    const poll = async () => {
      const { data: gens } = await sb.from('kreis_generated').select('*').eq('event_id', eventId).order('created_at', { ascending: false }).limit(20);
      const sceneCount = gens?.filter((g) => g.kind === 'scene_image').length || 0;
      const song = gens?.find((g) => g.kind === 'song');
      const songStatus = song?.meta?.suno_status;

      if (song?.meta?.lyrics) markDone(logLyrics());
      if (sceneCount >= 2) markDone(logScenes());
      if (songStatus === 'done' || song?.url) markDone(logAudio());

      if (!doneCalled && sceneCount >= 3 && (songStatus === 'done' || song?.url)) {
        doneCalled = true;
        setTimeout(onComplete, 1500);
      }
    };

    await poll();
    const interval = setInterval(async () => {
      if (doneCalled) { clearInterval(interval); return; }
      await poll();
    }, 6000);

    // Safety timeout after 5 min — always advance
    setTimeout(() => {
      if (!doneCalled) { doneCalled = true; clearInterval(interval); onComplete(); }
    }, 300000);
  }

  // ============================
  // ROUTER
  // ============================
  const params = new URLSearchParams(location.search);
  const eventId = params.get('event');
  const viewMode = params.get('view');
  const token = params.get('token');

  if (token) {
    renderHonoree(token);
  } else if (eventId && viewMode === 'wizard') {
    // Explicit wizard — load event then render wizard
    (async () => {
      const { data: event } = await sb.from('kreis_events').select('*').eq('id', eventId).single();
      if (event) renderWizard(event);
      else $app.innerHTML = '<p class="text-error py-20">Event nicht gefunden.</p>';
    })();
  } else if (eventId && viewMode === 'film') {
    renderEvent(eventId).then(() => {
      setTimeout(() => {
        const btn = document.getElementById('film-btn');
        if (btn && !btn.disabled) btn.click();
      }, 1200);
    });
  } else if (eventId) {
    // Auto-Wizard for first-time guests (no name set and not creator)
    (async () => {
      const { data: event } = await sb.from('kreis_events').select('*').eq('id', eventId).single();
      if (!event) { $app.innerHTML = '<p class="text-error py-20">Event nicht gefunden.</p>'; return; }
      const meName = getName();
      const isOwner = isMyEvent(event.id);
      if (!isOwner && meName) {
        // Check if this user already has a wizard_completed response
        const { data: myResp } = await sb.from('kreis_responses')
          .select('wizard_completed')
          .eq('event_id', event.id)
          .ilike('user_name', meName)
          .maybeSingle();
        if (!myResp?.wizard_completed) return renderWizard(event);
      } else if (!isOwner && !meName) {
        return renderWizard(event);
      }
      renderEvent(eventId);
    })();
  } else {
    renderCreate();
  }
</script>

</body>
</html>
