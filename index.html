<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
  // ============================
  // CONFIG
  // ============================
  const SUPABASE_URL = 'https://sgsufdxggvfgejwiclot.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnc3VmZHhnZ3ZmZ2Vqd2ljbG90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI2OTQsImV4cCI6MjA4OTI2ODY5NH0.PpS8WL9Z3a9kGObV1IbpRyOfaZGm0NtEovLxLlAfA4A';
  const PARSE_URL = `${SUPABASE_URL}/functions/v1/kreis-parse-event`;

  if (!window.supabase) {
    document.getElementById('app').innerHTML = '<div class="bg-surface-low rounded-2xl p-6 border border-error/30"><p class="text-error">Supabase-Library konnte nicht geladen werden. Offline oder Adblocker aktiv?</p></div>';
    throw new Error('supabase-js not loaded');
  }
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.addEventListener('error', (e) => console.error('[KREIS]', e.error || e.message));

  // ============================
  // HELPERS
  // ============================
  const $app = document.getElementById('app');
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const getName = () => localStorage.getItem('kreis_name') || '';
  const setName = (n) => localStorage.setItem('kreis_name', n);

  function formatDate(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function formatDateRange(start, end) {
    if (!start) return '—';
    const a = formatDate(start);
    if (!end || end === start) return a;
    return `${a} – ${formatDate(end)}`;
  }
  function initials(name) {
    const parts = (name || '?').trim().split(/\s+/);
    return (parts[0]?.[0] || '?').toUpperCase() + (parts.length > 1 ? (parts[parts.length - 1][0] || '').toUpperCase() : '');
  }

  // --- My Events (localStorage) ---
  function getMyEvents() {
    try { return JSON.parse(localStorage.getItem('kreis_my_events') || '[]'); } catch { return []; }
  }
  function addMyEvent(evt) {
    const mine = getMyEvents().filter(e => e.id !== evt.id);
    mine.unshift({ id: evt.id, title: evt.title, date_start: evt.date_start, date_end: evt.date_end, created_at: evt.created_at || new Date().toISOString() });
    localStorage.setItem('kreis_my_events', JSON.stringify(mine.slice(0, 50)));
  }
  function updateMyEvent(evt) {
    const mine = getMyEvents().map(e => e.id === evt.id ? { ...e, title: evt.title, date_start: evt.date_start, date_end: evt.date_end } : e);
    localStorage.setItem('kreis_my_events', JSON.stringify(mine));
  }
  function removeMyEvent(id) {
    localStorage.setItem('kreis_my_events', JSON.stringify(getMyEvents().filter(e => e.id !== id)));
  }
  function isMyEvent(id) { return getMyEvents().some(e => e.id === id); }

  // --- Share helpers ---
  function eventUrl(id) { return `${location.origin}${location.pathname}?event=${id}`; }
  function buildWhatsAppUrl(event, url) {
    const dateStr = event.date_start ? ` · ${formatDateRange(event.date_start, event.date_end)}` : '';
    const loc = event.location ? ` in ${event.location}` : '';
    const text = `Hey! ${event.title}${loc}${dateStr}\n\nSag mir hier ob du dabei bist:\n${url}`;
    return `https://wa.me/?text=${encodeURIComponent(text)}`;
  }

  // --- ICS export ---
  function icsDate(s) { return s.replace(/-/g, ''); }
  function addDays(s, n) {
    const d = new Date(s + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }
  function buildICS(event, url) {
    const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    const start = event.date_start ? icsDate(event.date_start) : null;
    const end = event.date_end ? icsDate(addDays(event.date_end, 1)) : (start ? icsDate(addDays(event.date_start, 1)) : null);
    const escIcs = (s) => String(s || '').replace(/[\\;,\n]/g, (c) => ({ '\\': '\\\\', ';': '\\;', ',': '\\,', '\n': '\\n' }[c]));
    const lines = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//KREIS//DE', 'CALSCALE:GREGORIAN', 'METHOD:PUBLISH',
      'BEGIN:VEVENT', `UID:${event.id}@kreis`, `DTSTAMP:${now}`,
    ];
    if (start) lines.push(`DTSTART;VALUE=DATE:${start}`);
    if (end) lines.push(`DTEND;VALUE=DATE:${end}`);
    lines.push(
      `SUMMARY:${escIcs(event.title)}`,
      event.location ? `LOCATION:${escIcs(event.location)}` : '',
      `DESCRIPTION:${escIcs([event.note, `KREIS-Link: ${url}`].filter(Boolean).join('\n'))}`,
      `URL:${url}`, 'END:VEVENT', 'END:VCALENDAR'
    );
    return lines.filter(Boolean).join('\r\n');
  }
  function downloadICS(event, url) {
    const blob = new Blob([buildICS(event, url)], { type: 'text/calendar;charset=utf-8' });
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl;
    a.download = `kreis-${(event.title || 'event').toLowerCase().replace(/[^a-z0-9äöüß]+/g, '-').slice(0, 40)}.ics`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(objUrl), 1000);
  }

  // ============================
  // RENDER: CREATE / LANDING
  // ============================
  function renderCreate(prefill = null) {
    const p = prefill || {};
    const hasPrefill = !!prefill;
    const mine = getMyEvents();
    const today = new Date().toISOString().slice(0, 10);

    $app.innerHTML = `
      ${mine.length > 0 ? `
      <section class="fade-in bg-surface-low rounded-3xl p-5 sm:p-6">
        <h2 class="text-on-surface-variant text-xs font-semibold tracking-widest uppercase mb-4">Deine Events</h2>
        <div class="flex flex-col gap-2">
          ${mine.slice(0, 8).map(e => {
            const past = e.date_start && e.date_start < today;
            const dateLabel = e.date_start
              ? new Date(e.date_start + 'T00:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: 'short' })
              : '—';
            return `
              <a href="?event=${esc(e.id)}" class="group flex items-center gap-3 bg-surface-high hover:bg-surface-bright rounded-2xl px-4 py-3 transition-colors ${past ? 'opacity-55' : ''}">
                <div class="bg-primary-container/15 text-primary-container text-[11px] font-semibold uppercase tracking-wide rounded-xl px-2.5 py-1.5 min-w-[56px] text-center leading-tight">
                  ${esc(dateLabel)}
                </div>
                <span class="flex-1 text-sm font-medium truncate">${esc(e.title)}</span>
                <span class="material-symbols-outlined text-on-surface-variant text-[20px] group-hover:text-primary-container transition-colors">chevron_right</span>
              </a>`;
          }).join('')}
        </div>
      </section>
      ` : ''}

      <section class="fade-in flex flex-col gap-5">
        <div class="flex flex-col gap-2 pl-1">
          <h1 class="text-3xl font-light tracking-tight">Was hast du vor?</h1>
          <p class="text-on-surface-variant text-base leading-relaxed">Einfach tippen — KREIS versteht's. Keine Formular-Gefummel.</p>
        </div>
        <div class="bg-surface-low rounded-3xl p-4 flex flex-col gap-4">
          <textarea
            id="nl-input"
            class="w-full bg-surface-highest/60 placeholder:text-outline-variant rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors p-4 min-h-[110px] resize-none text-base font-light leading-relaxed"
            placeholder="z.B. Klettern Reutlingen nächsten Samstag 15 Uhr mit Nino und Cindy"
            autofocus>${esc(p._raw || '')}</textarea>
          <button
            id="parse-btn"
            class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-medium rounded-2xl py-3.5 px-5 hover:shadow-[0_12px_32px_rgba(167,139,250,0.2)] transition-shadow flex items-center justify-center gap-2">
            <span class="sparkle-pulse">✨</span>
            <span id="parse-btn-text">${hasPrefill ? 'Neu parsen' : 'Event verstehen'}</span>
          </button>
          <button id="toggle-manual" class="text-on-surface-variant text-sm font-light hover:text-on-surface transition-colors ${hasPrefill ? 'hidden' : ''}">
            lieber manuell ausfüllen
          </button>
        </div>
        <div id="parse-feedback"></div>
      </section>

      <section id="preview-section" class="flex flex-col gap-5 ${hasPrefill ? 'fade-in' : 'hidden'}">
        <div class="flex flex-col gap-2 pl-1">
          <h2 class="text-2xl font-light tracking-tight">${hasPrefill ? 'Passt das?' : 'Manuell'}</h2>
          <p class="text-on-surface-variant text-sm ${hasPrefill ? '' : 'hidden'}">KREIS hat das verstanden. Ändern wo nötig.</p>
        </div>
        <div class="bg-surface-low rounded-3xl p-5 sm:p-6 flex flex-col gap-5 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container opacity-50"></div>

          ${Array.isArray(p.friends) && p.friends.length > 0 ? `
          <div class="flex flex-wrap items-center gap-2">
            <span class="text-on-surface-variant text-sm">Freunde, die du nennst:</span>
            ${p.friends.map(f => `<span class="bg-primary-container/10 text-primary-container border border-primary-container/20 rounded-full px-3 py-1 text-sm">${esc(f)}</span>`).join('')}
          </div>
          ` : ''}

          <div class="flex flex-col gap-4">
            <label class="flex flex-col gap-2">
              <span class="text-sm text-on-surface-variant ml-1">Dein Name <span class="text-primary-container">*</span></span>
              <input id="creator" type="text" placeholder="z.B. Jürgen" value="${esc(getName())}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors px-4 py-3">
              ${!getName() ? '<span class="text-xs text-primary-container ml-1">← Damit deine Freunde wissen, von wem die Einladung kommt.</span>' : ''}
            </label>
            <label class="flex flex-col gap-2">
              <span class="text-sm text-on-surface-variant ml-1">Was? <span class="text-primary-container">*</span></span>
              <input id="title" type="text" placeholder="z.B. Klettern im Kletterwald" value="${esc(p.title || '')}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors px-4 py-3">
            </label>
            <label class="flex flex-col gap-2">
              <span class="text-sm text-on-surface-variant ml-1">Wo?</span>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">location_on</span>
                <input id="location" type="text" placeholder="z.B. Reutlingen Hallenbad" value="${esc(p.location || '')}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors pl-11 pr-4 py-3">
              </div>
            </label>
            <div class="grid grid-cols-2 gap-3">
              <label class="flex flex-col gap-2">
                <span class="text-sm text-on-surface-variant ml-1">Wann? (von)</span>
                <div class="relative">
                  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">calendar_today</span>
                  <input id="date_start" type="date" value="${esc(p.date_start || '')}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors pl-11 pr-3 py-3">
                </div>
              </label>
              <label class="flex flex-col gap-2">
                <span class="text-sm text-on-surface-variant ml-1">bis (optional)</span>
                <input id="date_end" type="date" value="${esc(p.date_end || '')}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors px-4 py-3">
              </label>
            </div>
            <label class="flex flex-col gap-2">
              <span class="text-sm text-on-surface-variant ml-1">Link (optional)</span>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">link</span>
                <input id="link" type="url" placeholder="https://" value="${esc(p.link || '')}" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors pl-11 pr-4 py-3">
              </div>
            </label>
            <label class="flex flex-col gap-2">
              <span class="text-sm text-on-surface-variant ml-1">Notiz (optional)</span>
              <textarea id="note" placeholder="Irgendwas Wichtiges?" class="w-full bg-surface-highest rounded-2xl border border-outline-variant/20 focus:border-primary-container/50 focus:bg-surface-bright focus:ring-0 transition-colors px-4 py-3 min-h-[80px] resize-none">${esc(p.note || '')}</textarea>
            </label>
          </div>

          <button id="create-btn" class="w-full mt-2 bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-medium rounded-2xl py-3.5 px-5 hover:shadow-[0_12px_32px_rgba(167,139,250,0.25)] transition-shadow flex items-center justify-center gap-2">
            <span>Event erstellen &amp; Link kopieren</span>
            <span class="material-symbols-outlined text-[20px]">content_copy</span>
          </button>
          <div id="create-feedback"></div>
        </div>
      </section>
    `;

    document.getElementById('parse-btn').addEventListener('click', parseNL);
    document.getElementById('create-btn')?.addEventListener('click', createEvent);
    document.getElementById('nl-input').addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); parseNL(); }
    });
    const tm = document.getElementById('toggle-manual');
    if (tm) tm.addEventListener('click', () => {
      document.getElementById('preview-section').classList.remove('hidden');
      tm.classList.add('hidden');
      document.getElementById(getName() ? 'title' : 'creator').focus();
    });

    if (hasPrefill) {
      setTimeout(() => {
        if (!getName()) document.getElementById('creator')?.focus();
      }, 100);
    }
  }

  async function parseNL() {
    const text = document.getElementById('nl-input').value.trim();
    const fb = document.getElementById('parse-feedback');
    const btn = document.getElementById('parse-btn');
    const btnText = document.getElementById('parse-btn-text');

    if (!text) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Erst was eintippen, dann KREIS zaubern lassen.</div>';
      return;
    }
    btn.disabled = true;
    btnText.textContent = 'denke nach…';
    fb.innerHTML = '';

    try {
      const resp = await fetch(PARSE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ text, today: new Date().toISOString().slice(0, 10) }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">KREIS hat's nicht geschnallt: ${esc(err.error || 'unbekannt')}. Nochmal probieren oder manuell.</div>`;
        btn.disabled = false; btnText.textContent = 'Event verstehen';
        return;
      }
      const { parsed } = await resp.json();
      parsed._raw = text;
      renderCreate(parsed);
    } catch (err) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Netzwerk-Fehler: ${esc(err.message || err)}. Offline?</div>`;
      btn.disabled = false; btnText.textContent = 'Event verstehen';
    }
  }

  async function createEvent() {
    const titleEl = document.getElementById('title');
    const creatorEl = document.getElementById('creator');
    const title = titleEl.value.trim();
    const locationVal = document.getElementById('location').value.trim();
    const date_start = document.getElementById('date_start').value || null;
    const date_end = document.getElementById('date_end').value || null;
    const link = document.getElementById('link').value.trim() || null;
    const note = document.getElementById('note').value.trim() || null;
    const creator = creatorEl.value.trim();
    const fb = document.getElementById('create-feedback');
    const btn = document.getElementById('create-btn');

    titleEl.classList.remove('missing');
    creatorEl.classList.remove('missing');

    const missing = [];
    if (!creator) { missing.push('Dein Name'); creatorEl.classList.add('missing'); }
    if (!title) { missing.push('Was (Titel)'); titleEl.classList.add('missing'); }
    if (missing.length) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehlt noch: <strong>${missing.join(' und ')}</strong>. Rot markiert.</div>`;
      (missing[0] === 'Dein Name' ? creatorEl : titleEl).focus();
      return;
    }

    setName(creator);
    btn.disabled = true;
    btn.innerHTML = '<span>erstelle…</span>';

    const { data, error } = await sb.from('kreis_events').insert({
      title, location: locationVal || null, date_start, date_end, link, note, created_by: creator
    }).select().single();
    if (error) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehler: ${esc(error.message)}</div>`;
      btn.disabled = false;
      btn.innerHTML = '<span>Event erstellen &amp; Link kopieren</span><span class="material-symbols-outlined text-[20px]">content_copy</span>';
      return;
    }

    await sb.from('kreis_responses').insert({ event_id: data.id, user_name: creator, response: 'yes' });
    addMyEvent(data);

    const url = eventUrl(data.id);
    try {
      await navigator.clipboard.writeText(url);
      fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Erstellt. Link kopiert — jetzt in WhatsApp einfügen.</div>';
    } catch {
      fb.innerHTML = `<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm break-all">Erstellt. Link:<br>${esc(url)}</div>`;
    }
    setTimeout(() => { location.href = url; }, 1000);
  }

  async function castVote(eventId, vote) {
    const name = document.getElementById('my-name').value.trim();
    const note = document.getElementById('my-note').value.trim() || null;
    const fb = document.getElementById('vote-feedback');
    if (!name) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Bitte deinen Namen eintragen.</div>';
      return;
    }
    setName(name);
    const { error } = await sb.from('kreis_responses').upsert({ event_id: eventId, user_name: name, response: vote, note }, { onConflict: 'event_id,user_name' });
    if (error) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehler: ${esc(error.message)}</div>`;
      return;
    }
    fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Danke. Gespeichert.</div>';
    setTimeout(async () => {
      const { data: fresh } = await sb.from('kreis_events').select('*').eq('id', eventId).single();
      if (fresh) await loadAndRenderEventView(fresh);
    }, 700);
  }

  async function copyLink(url) {
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(url);
      btn.textContent = 'kopiert ✓';
      setTimeout(() => { btn.textContent = 'kopieren'; }, 1500);
    } catch {
      btn.textContent = 'Fehler';
    }
  }

  async function nativeShare(event, url) {
    const text = `${event.title}${event.location ? ` · ${event.location}` : ''}${event.date_start ? ` · ${formatDateRange(event.date_start, event.date_end)}` : ''}`;
    try {
      await navigator.share({ title: event.title, text, url });
    } catch (err) {
      if (err.name !== 'AbortError') console.warn('[KREIS] share:', err);
    }
  }

      };

        fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm mt-2">Titel ist Pflicht.</div>';
        return;
      }

      updateMyEvent(data);
      await loadAndRenderEventView(data);

  // ============================
  // AI-EINLADUNG (Face-Swap)
  // ============================
  const FACE_SWAP_URL = `${SUPABASE_URL}/functions/v1/kreis-face-swap`;
  // MVP: hardcoded Demo-Target (Unsplash, Gruppenfoto-Vibe). Später dynamisch via Gemini.
  const DEMO_TARGET_SCENE = 'https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=768&q=80';

  let uploadedFaceMeta = null; // { path, publicUrl, signedUrl }

  async function loadExistingFace(event) {
    const me = getName() || event.created_by;
    if (!me) return;
    const { data: faces } = await sb.from('kreis_faces')
      .select('*')
      .eq('event_id', event.id)
      .eq('user_name', me)
      .limit(1);
    if (faces && faces[0]) {
      const f = faces[0];
      const { data: signed } = await sb.storage.from('kreis-faces').createSignedUrl(f.storage_path, 300);
      if (signed?.signedUrl) {
        uploadedFaceMeta = { path: f.storage_path, signedUrl: signed.signedUrl };
        showFacePreview(signed.signedUrl, 'Bereits hochgeladen');
      }
    }

    // Show existing generated swaps for this event
    const { data: gens } = await sb.from('kreis_generated')
      .select('*')
      .eq('event_id', event.id)
      .eq('kind', 'face_swap')
      .order('created_at', { ascending: false })
      .limit(4);
    if (gens && gens.length) {
      const box = document.getElementById('invite-result');
      if (box) box.innerHTML = renderSwapResults(gens);
    }
  }

  function showFacePreview(url, label) {
    const pv = document.getElementById('face-preview');
    const dropZone = document.getElementById('face-drop-zone');
    const btn = document.getElementById('generate-invite-btn');
    const btnText = document.getElementById('generate-invite-btn-text');
    if (!pv) return;
    pv.classList.remove('hidden');
    pv.innerHTML = `
      <div class="flex items-center gap-3 bg-surface-high rounded-2xl p-3">
        <img src="${esc(url)}" alt="Dein Face" class="w-16 h-16 rounded-xl object-cover">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate">${esc(label)}</p>
          <button id="face-change-btn" class="text-xs text-on-surface-variant hover:text-primary-container underline mt-1">ändern</button>
        </div>
        <span class="material-symbols-outlined text-yes">check_circle</span>
      </div>
    `;
    if (dropZone) dropZone.classList.add('hidden');
    if (btn) btn.disabled = false;
    if (btnText) btnText.textContent = 'Einladungs-Bild generieren';
    document.getElementById('face-change-btn')?.addEventListener('click', () => {
      document.getElementById('face-input')?.click();
    });
  }

  async function handleFaceUpload(e, event) {
    const file = e.target.files?.[0];
    if (!file) return;
    const fb = document.getElementById('invite-feedback');
    const btn = document.getElementById('generate-invite-btn');
    const btnText = document.getElementById('generate-invite-btn-text');

    if (file.size > 5 * 1024 * 1024) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Foto ist größer als 5 MB. Kleineres nehmen.</div>';
      return;
    }

    fb.innerHTML = '<div class="text-on-surface-variant text-sm px-1">lade hoch…</div>';
    btn.disabled = true;

    const me = getName() || event.created_by || 'anon';
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '').slice(0, 4) || 'jpg';
    const path = `${event.id}/${me.toLowerCase().replace(/[^a-z0-9]/g, '-')}-${Date.now()}.${ext}`;

    const { error: uploadErr } = await sb.storage.from('kreis-faces').upload(path, file, {
      cacheControl: '3600',
      upsert: true,
      contentType: file.type,
    });
    if (uploadErr) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Upload fehlgeschlagen: ${esc(uploadErr.message)}</div>`;
      btn.disabled = true;
      btnText.textContent = 'Erst Foto hochladen';
      return;
    }

    // Signed URL (Replicate kann dann holen, private bucket bleibt privat)
    const { data: signed, error: signErr } = await sb.storage.from('kreis-faces').createSignedUrl(path, 600);
    if (signErr || !signed?.signedUrl) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Signed-URL konnte nicht erstellt werden.</div>';
      return;
    }

    // Insert face row (or update if exists)
    await sb.from('kreis_faces').upsert({
      event_id: event.id,
      user_name: me,
      storage_path: path,
      consent_given: true,
    }, { onConflict: 'event_id,user_name' });

    uploadedFaceMeta = { path, signedUrl: signed.signedUrl };
    fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Foto hochgeladen.</div>';
    showFacePreview(signed.signedUrl, file.name);
    setTimeout(() => { fb.innerHTML = ''; }, 2000);
  }

  function renderSwapResults(rows) {
    return `
      <div class="grid grid-cols-1 gap-3">
        ${rows.map(r => `
          <div class="bg-surface-high rounded-2xl overflow-hidden">
            <img src="${esc(r.url)}" alt="AI-Einladung" class="w-full aspect-[3/4] object-cover">
            <div class="flex gap-2 p-3">
              <a href="${esc(r.url)}" target="_blank" rel="noopener" download class="flex-1 bg-surface-highest hover:bg-surface-bright text-xs font-medium rounded-xl py-2 px-3 transition-colors text-center">öffnen / speichern</a>
              <button onclick="shareSwapImage('${esc(r.url)}')" class="flex-1 bg-gradient-to-br from-primary to-primary-container text-on-primary-container text-xs font-medium rounded-xl py-2 px-3 transition-shadow hover:shadow-[0_4px_12px_rgba(167,139,250,0.3)]">teilen</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  window.shareSwapImage = async (url) => {
    if ('share' in navigator) {
      try {
        await navigator.share({ url, title: 'KREIS Einladung' });
      } catch (e) {
        if (e.name !== 'AbortError') navigator.clipboard?.writeText(url);
      }
    } else {
      await navigator.clipboard?.writeText(url);
    }
  };

  async function generateInvite(event) {
    if (!uploadedFaceMeta?.signedUrl) return;
    const fb = document.getElementById('invite-feedback');
    const btn = document.getElementById('generate-invite-btn');
    const btnText = document.getElementById('generate-invite-btn-text');
    const result = document.getElementById('invite-result');

    btn.disabled = true;
    btnText.innerHTML = 'generiere… (~15 Sek)';
    fb.innerHTML = '<div class="text-on-surface-variant text-sm px-1">Face-Swap läuft — Replicate + Supabase…</div>';

    try {
      const resp = await fetch(FACE_SWAP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'apikey': SUPABASE_KEY,
        },
        body: JSON.stringify({
          event_id: event.id,
          source_face_url: uploadedFaceMeta.signedUrl,
          target_image_url: DEMO_TARGET_SCENE,
          user_name: getName() || event.created_by,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehler: ${esc(err.detail || err.error || 'unbekannt')}</div>`;
        btn.disabled = false;
        btnText.textContent = 'Nochmal versuchen';
        return;
      }

      const { swapped_url } = await resp.json();
      fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Fertig. Siehe unten.</div>';

      // Reload all swaps for this event
      const { data: gens } = await sb.from('kreis_generated')
        .select('*')
        .eq('event_id', event.id)
        .eq('kind', 'face_swap')
        .order('created_at', { ascending: false })
        .limit(4);
      result.innerHTML = renderSwapResults(gens || [{ url: swapped_url }]);

      btn.disabled = false;
      btnText.textContent = 'Nochmal generieren';
      setTimeout(() => { fb.innerHTML = ''; }, 3000);
    } catch (err) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Netzwerk-Fehler: ${esc(err.message || err)}</div>`;
      btn.disabled = false;
      btnText.textContent = 'Nochmal versuchen';
    }
  }

  function confirmDelete(event) {
    if (refreshTimer) clearInterval(refreshTimer);
    const fb = document.getElementById('action-feedback');
    fb.innerHTML = `
      <div class="bg-error/10 border border-error/30 rounded-2xl p-4 mt-2">
        <p class="text-error text-sm mb-3">Sicher? Das Event und alle Antworten werden gelöscht. Nicht rückgängig machbar.</p>
        <div class="grid grid-cols-2 gap-2">
          <button id="cancel-delete" class="bg-surface-highest hover:bg-surface-bright text-sm rounded-xl py-2.5 transition-colors">Doch nicht</button>
          <button id="do-delete" class="bg-error/80 hover:bg-error text-on-surface text-sm font-medium rounded-xl py-2.5 transition-colors">Ja, löschen</button>
        </div>
      </div>
    `;
    document.getElementById('cancel-delete').addEventListener('click', () => { fb.innerHTML = ''; scheduleRefresh(event); });
    document.getElementById('do-delete').addEventListener('click', async () => {
      const { error } = await sb.from('kreis_events').delete().eq('id', event.id);
      if (error) {
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm mt-2">Fehler: ${esc(error.message)}</div>`;
        return;
      }
      removeMyEvent(event.id);
      location.href = '?';
    });
  }

  // ============================
  // ROUTER
  // ============================
  const params = new URLSearchParams(location.search);
  const eventId = params.get('event');
  if (eventId) renderEvent(eventId); else renderCreate();
</script>

</body>
