  .film-progress {

  .film-close {

    background: rgba(0,0,0,0.6); color: white;
    width: 40px; height: 40px; border-radius: 50%;

  .sparkle-pulse { animation: sparkle 2.5s ease-in-out infinite; display: inline-block; }
  @keyframes sparkle {

  .vote-btn.selected-yes { border-color: var(--yes, #22c55e) !important; background: rgba(34, 197, 94, 0.1) !important; }

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<script>
  // ============================
  // CONFIG
  // ============================
  const SUPABASE_URL = 'https://sgsufdxggvfgejwiclot.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnc3VmZHhnZ3ZmZ2Vqd2ljbG90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI2OTQsImV4cCI6MjA4OTI2ODY5NH0.PpS8WL9Z3a9kGObV1IbpRyOfaZGm0NtEovLxLlAfA4A';
  const PARSE_URL = `${SUPABASE_URL}/functions/v1/kreis-parse-event`;

  if (!window.supabase) {
    document.getElementById('app').innerHTML = '<div class="bg-surface-low rounded-2xl p-6 border border-error/30"><p class="text-error">Supabase-Library konnte nicht geladen werden. Offline oder Adblocker aktiv?</p></div>';
    throw new Error('supabase-js not loaded');
  }
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.addEventListener('error', (e) => console.error('[KREIS]', e.error || e.message));

  // ============================
  // HELPERS
  // ============================
  const $app = document.getElementById('app');
  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const getName = () => localStorage.getItem('kreis_name') || '';
  const setName = (n) => localStorage.setItem('kreis_name', n);

  function formatDate(d) {
    if (!d) return '';
    return new Date(d + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function formatDateRange(start, end) {
    if (!start) return '—';
    const a = formatDate(start);
    if (!end || end === start) return a;
    return `${a} – ${formatDate(end)}`;
  }
  function initials(name) {
    const parts = (name || '?').trim().split(/\s+/);
    return (parts[0]?.[0] || '?').toUpperCase() + (parts.length > 1 ? (parts[parts.length - 1][0] || '').toUpperCase() : '');
  }

  // --- My Events (localStorage) ---
  function getMyEvents() {
    try { return JSON.parse(localStorage.getItem('kreis_my_events') || '[]'); } catch { return []; }
  }
  function addMyEvent(evt) {
    const mine = getMyEvents().filter(e => e.id !== evt.id);
    mine.unshift({ id: evt.id, title: evt.title, date_start: evt.date_start, date_end: evt.date_end, created_at: evt.created_at || new Date().toISOString() });
    localStorage.setItem('kreis_my_events', JSON.stringify(mine.slice(0, 50)));
  }
  function updateMyEvent(evt) {
    const mine = getMyEvents().map(e => e.id === evt.id ? { ...e, title: evt.title, date_start: evt.date_start, date_end: evt.date_end } : e);
    localStorage.setItem('kreis_my_events', JSON.stringify(mine));
  }
  function removeMyEvent(id) {
    localStorage.setItem('kreis_my_events', JSON.stringify(getMyEvents().filter(e => e.id !== id)));
  }
  function isMyEvent(id) { return getMyEvents().some(e => e.id === id); }

  // --- Share helpers ---
  function eventUrl(id) { return `${location.origin}${location.pathname}?event=${id}`; }
  function buildWhatsAppUrl(event, url) {
    const dateStr = event.date_start ? ` · ${formatDateRange(event.date_start, event.date_end)}` : '';
    const loc = event.location ? ` in ${event.location}` : '';
    const text = `Hey! ${event.title}${loc}${dateStr}\n\nSag mir hier ob du dabei bist:\n${url}`;
    return `https://wa.me/?text=${encodeURIComponent(text)}`;
  }

  // --- ICS export ---
  function icsDate(s) { return s.replace(/-/g, ''); }
  function addDays(s, n) {
    const d = new Date(s + 'T00:00:00Z'); d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }
  function buildICS(event, url) {
    const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    const start = event.date_start ? icsDate(event.date_start) : null;
    const end = event.date_end ? icsDate(addDays(event.date_end, 1)) : (start ? icsDate(addDays(event.date_start, 1)) : null);
    const escIcs = (s) => String(s || '').replace(/[\\;,\n]/g, (c) => ({ '\\': '\\\\', ';': '\\;', ',': '\\,', '\n': '\\n' }[c]));
    const lines = [
      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//KREIS//DE', 'CALSCALE:GREGORIAN', 'METHOD:PUBLISH',
      'BEGIN:VEVENT', `UID:${event.id}@kreis`, `DTSTAMP:${now}`,
    ];
    if (start) lines.push(`DTSTART;VALUE=DATE:${start}`);
    if (end) lines.push(`DTEND;VALUE=DATE:${end}`);
    lines.push(
      `SUMMARY:${escIcs(event.title)}`,
      event.location ? `LOCATION:${escIcs(event.location)}` : '',
      `DESCRIPTION:${escIcs([event.note, `KREIS-Link: ${url}`].filter(Boolean).join('\n'))}`,
      `URL:${url}`, 'END:VEVENT', 'END:VCALENDAR'
    );
    return lines.filter(Boolean).join('\r\n');
  }
  function downloadICS(event, url) {
    const blob = new Blob([buildICS(event, url)], { type: 'text/calendar;charset=utf-8' });
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl;
    a.download = `kreis-${(event.title || 'event').toLowerCase().replace(/[^a-z0-9äöüß]+/g, '-').slice(0, 40)}.ics`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(objUrl), 3000);
  }

  // ============================
  // RENDER: CREATE / LANDING
  // ============================
  function renderCreate(prefill = null) {
    hideStickyShare();
    const p = prefill || {};
    const hasPrefill = !!prefill;
    const mine = getMyEvents();
    const today = new Date().toISOString().slice(0, 10);

    $app.innerHTML = `
      <!-- Global radial light-leak (Stitch exact) -->
      <div class="stitch-global-leak"></div>

      ${mine.length > 0 ? `
      <section class="fade-in flex flex-col gap-4">
        <div class="flex items-center gap-4 pl-2">
          <div class="w-2 h-2 rounded-full bg-tertiary shadow-[0_0_12px_rgba(219,200,57,0.6)]"></div>
          <h3 class="font-mono-stitch text-[11px] uppercase tracking-[0.2em] text-on-surface-variant">Deine Events</h3>
        </div>
        <div class="flex flex-col gap-2">
          ${mine.slice(0, 8).map(e => {
            const past = e.date_start && e.date_start < today;
            const dateLabel = e.date_start
              ? new Date(e.date_start + 'T00:00:00').toLocaleDateString('de-DE', { day: '2-digit', month: 'short' }).toUpperCase()
              : '—';
            return `
              <a href="?event=${esc(e.id)}" class="group glass-panel hover:bg-surface-variant/30 rounded-xl px-5 py-4 flex items-center gap-5 liquid-button ${past ? 'opacity-50' : ''}">
                <div class="font-mono-stitch text-[10px] text-primary tracking-[0.2em] uppercase min-w-[56px]">
                  ${esc(dateLabel)}
                </div>
                <span class="flex-1 font-display-stitch text-base font-medium truncate">${esc(e.title)}</span>
                <span class="material-symbols-outlined text-outline text-[18px] group-hover:text-primary group-hover:translate-x-0.5 transition-all" style="font-variation-settings:'wght' 300">arrow_forward</span>
              </a>`;
          }).join('')}
        </div>
      </section>
      ` : ''}

      <!-- Hero: NL Input (Stitch Intima exact) -->
      <section class="flex flex-col gap-8 relative z-10">
        <h2 class="font-display-stitch text-[2.5rem] md:text-[3.5rem] leading-[1.1] tracking-[-0.02em] font-light">Was hast du vor?</h2>

        <div class="relative group">
          <div class="absolute inset-0 bg-primary-container/5 rounded-3xl blur-[40px] opacity-0 group-focus-within:opacity-100 transition-opacity duration-700 pointer-events-none"></div>

    document.getElementById('parse-btn').addEventListener('click', parseNL);
    document.getElementById('create-btn')?.addEventListener('click', createEvent);
    document.getElementById('nl-input').addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); parseNL(); }
    });
    const tm = document.getElementById('toggle-manual');
    if (tm) tm.addEventListener('click', () => {
      document.getElementById('preview-section').classList.remove('hidden');
      tm.classList.add('hidden');
      document.getElementById(getName() ? 'title' : 'creator').focus();
    });

    if (hasPrefill) {
      setTimeout(() => {
        if (!getName()) document.getElementById('creator')?.focus();
      }, 100);
    }
  }

  async function parseNL() {
    const text = document.getElementById('nl-input').value.trim();
    const fb = document.getElementById('parse-feedback');
    const btn = document.getElementById('parse-btn');
    const btnText = document.getElementById('parse-btn-text');

    if (!text) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Erst was eintippen, dann KREIS zaubern lassen.</div>';
      return;
    }
    btn.disabled = true;
    btnText.textContent = 'denke nach…';
    fb.innerHTML = '';

    try {
      const resp = await fetch(PARSE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ text, today: new Date().toISOString().slice(0, 10) }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">KREIS hat's nicht geschnallt: ${esc(err.error || 'unbekannt')}. Nochmal probieren oder manuell.</div>`;
        btn.disabled = false; btnText.textContent = 'Event verstehen';
        return;
      }
      const { parsed } = await resp.json();
      parsed._raw = text;
      renderCreate(parsed);
    } catch (err) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Netzwerk-Fehler: ${esc(err.message || err)}. Offline?</div>`;
      btn.disabled = false; btnText.textContent = 'Event verstehen';
    }
  }

  async function createEvent() {
    const titleEl = document.getElementById('title');
    const creatorEl = document.getElementById('creator');
    const title = titleEl.value.trim();
    const locationVal = document.getElementById('location').value.trim();
    const date_start = document.getElementById('date_start').value || null;
    const date_end = document.getElementById('date_end').value || null;
    const link = document.getElementById('link').value.trim() || null;
    const note = document.getElementById('note').value.trim() || null;
    const guest_of_honor = document.getElementById('guest_of_honor')?.value.trim() || null;
    const creator = creatorEl.value.trim();
    const fb = document.getElementById('create-feedback');
    const btn = document.getElementById('create-btn');

    titleEl.classList.remove('missing');
    creatorEl.classList.remove('missing');

    const missing = [];
    if (!creator) { missing.push('Dein Name'); creatorEl.classList.add('missing'); }
    if (!title) { missing.push('Was (Titel)'); titleEl.classList.add('missing'); }
    if (missing.length) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehlt noch: <strong>${missing.join(' und ')}</strong>. Rot markiert.</div>`;
      (missing[0] === 'Dein Name' ? creatorEl : titleEl).focus();
      return;
    }

    setName(creator);
    btn.disabled = true;
    btn.innerHTML = '<span>erstelle…</span>';

    const { data, error } = await sb.from('kreis_events').insert({
      title, location: locationVal || null, date_start, date_end, link, note, created_by: creator,
      guest_of_honor: guest_of_honor || null,
    }).select().single();
    if (error) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehler: ${esc(error.message)}</div>`;
      btn.disabled = false;
      btn.innerHTML = '<span>Event erstellen &amp; Link kopieren</span><span class="material-symbols-outlined text-[20px]">content_copy</span>';
      return;
    }

    await sb.from('kreis_responses').insert({ event_id: data.id, user_name: creator, response: 'yes' });
    addMyEvent(data);

    const url = eventUrl(data.id);
    try {
      await navigator.clipboard.writeText(url);
      fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Erstellt. Link kopiert — jetzt in WhatsApp einfügen.</div>';
    } catch {
      fb.innerHTML = `<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm break-all">Erstellt. Link:<br>${esc(url)}</div>`;
    }
    setTimeout(() => { location.href = url; }, 1000);
  }

  // ============================
  // RENDER: EVENT DETAIL
  // ============================
  async function renderEvent(eventId) {
    $app.innerHTML = '<div class="text-center text-on-surface-variant py-20">lade Event…</div>';
    const { data: event, error } = await sb.from('kreis_events').select('*').eq('id', eventId).single();
    if (error || !event) {
      $app.innerHTML = `
        <div class="bg-surface-low rounded-3xl p-6 border border-error/30">
          <p class="text-error mb-3">Event nicht gefunden. Link kaputt?</p>
          <a href="?" class="inline-block bg-surface-highest hover:bg-surface-bright px-4 py-2.5 rounded-2xl text-sm transition-colors">Neues Event erstellen</a>
        </div>`;
      return;
    }
    await loadAndRenderEventView(event);
  }

  let refreshTimer = null;
  function scheduleRefresh(event) {
    if (refreshTimer) clearInterval(refreshTimer);
    // KEIN Auto-Refresh wenn Owner (Face-Section-Flicker-Fix).
    // Gaeste sehen Auto-Refresh fuer Live-Voting-Status.
    if (isMyEvent(event.id)) return;
    refreshTimer = setInterval(() => loadAndRenderEventView(event, true), 8000);
  }

    $app.innerHTML = `

  function showStickyShare(event, url) {
    const pill = document.getElementById('sticky-share-pill');
    if (!pill) return;
    pill.classList.remove('hidden');
    const label = document.getElementById('sticky-share-label');
    if (label) label.textContent = event.title;
    const copyBtn = document.getElementById('sticky-share-copy');
    if (copyBtn) {
      copyBtn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(url);
          copyBtn.innerHTML = '<span class="material-symbols-outlined text-[18px] text-primary">check</span>';
          setTimeout(() => { copyBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]" style="font-variation-settings:\'wght\' 300">link</span>'; }, 1500);
        } catch {}
      };
    }
    const actionBtn = document.getElementById('sticky-share-action');
    if (actionBtn) {
      actionBtn.onclick = async () => {
        if ('share' in navigator) {
          try {
            await navigator.share({ title: event.title, text: event.title, url });
          } catch {}
        } else {
          // Fallback: WhatsApp
          window.open(buildWhatsAppUrl(event, url), '_blank', 'noopener');
        }
      };
    }
  }

  function hideStickyShare() {
    const pill = document.getElementById('sticky-share-pill');
    if (pill) pill.classList.add('hidden');
  }

  // ============================
  // V3: OWNER DASHBOARD LOGIC
  // ============================
  async function initV3Dashboard(event, responses) {
    const completed = responses.filter((r) => r.wizard_completed);
    const completedCount = completed.length;
    const threshold = event.auto_render_threshold ?? 3;
    const renderCount = event.render_count ?? 0;
    const maxRenders = 3;

    // Counter
    const counterEl = document.getElementById('wizard-counter');
    if (counterEl) counterEl.textContent = `${completedCount} OF ${Math.max(threshold, completedCount)} COMPLETED`;

    // Contributors row — Pulse-Dot + Name pills
    const contribEl = document.getElementById('contributors-row');
    if (contribEl) {
      contribEl.innerHTML = completed.length > 0
        ? completed.slice(0, 5).map((r) => `
            <div class="glass-pill px-3 py-1.5 flex items-center gap-1.5">
              <div class="pulse-dot"></div>
              <span class="font-tech text-[9px] text-on-surface uppercase">${esc(r.user_name)}</span>
            </div>
          `).join('')
        : '<p class="font-tech text-[10px] text-on-surface-variant/40 uppercase">WAITING_FOR_FIRST_WIZARD</p>';
    }

    // Load latest scenes + song for compose-status-card
    const { data: gens } = await sb.from('kreis_generated')
      .select('*')
      .eq('event_id', event.id)
      .order('created_at', { ascending: false })
      .limit(20);
    const scenes = (gens || []).filter((g) => g.kind === 'scene_image');
    const song = (gens || []).find((g) => g.kind === 'song');
    const songReady = !!(song && (song.url || song.meta?.suno_status === 'done'));
    const hasFilm = scenes.length >= 2 && songReady;

    const statusCard = document.getElementById('compose-status-card');
    if (statusCard) {
      if (hasFilm) {
        const coverUrl = scenes[0]?.url;
        statusCard.innerHTML = `
          <div class="absolute inset-0 w-full h-full">
            <img src="${esc(coverUrl)}" alt="Film Preview" class="w-full h-full object-cover opacity-80">
            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-6">
              <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-primary text-xl" style="font-variation-settings:'FILL' 1;">movie</span>
                <h3 class="font-headline text-xl text-on-surface font-medium">FILM IST BEREIT</h3>
              </div>
              <p class="font-tech text-[9px] text-on-surface-variant/70 uppercase mt-2">${scenes.length} SCENES · ${songReady ? 'SONG ✓' : 'SONG PENDING'}</p>
            </div>
          </div>`;
      } else if (event.auto_render_triggered_at && !hasFilm) {
        statusCard.innerHTML = `
          <div class="text-center p-6">
            <div class="pulse-dot mx-auto mb-3"></div>
            <p class="font-tech text-[10px] text-primary/80 uppercase tracking-[0.2em]">RENDERING_IN_PROGRESS</p>
            <p class="font-tech text-[9px] text-on-surface-variant/50 mt-2">${scenes.length} / 4 scenes · ${songReady ? 'song ready' : 'song pending'}</p>
          </div>`;
      } else if (completedCount >= threshold) {
        statusCard.innerHTML = `
          <div class="text-center p-6">
            <span class="material-symbols-outlined text-primary text-4xl mb-2" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
            <p class="font-tech text-[10px] text-primary uppercase tracking-[0.2em]">READY_TO_COMPOSE</p>
            <p class="font-tech text-[9px] text-on-surface-variant/60 mt-2">Klicke unten auf FILM ERSTELLEN</p>
          </div>`;
      } else {
        statusCard.innerHTML = `
          <div class="text-center p-6">
            <span class="material-symbols-outlined text-on-surface-variant/40 text-4xl mb-2">hourglass_empty</span>
            <p class="font-tech text-[10px] text-on-surface-variant/60 uppercase tracking-[0.2em]">WAITING_FOR_GUESTS</p>
            <p class="font-tech text-[9px] text-on-surface-variant/40 mt-2">Noch ${Math.max(0, threshold - completedCount)} Wizard-Completions bis Auto-Film</p>
          </div>`;
      }
    }

    // Render Button
    const renderBtn = document.getElementById('v3-render-btn');
    const renderBtnText = document.getElementById('v3-render-btn-text');
    const renderBadge = document.getElementById('v3-render-badge');
    if (renderBtn) {
      const canRender = completedCount >= 1 && renderCount < maxRenders;
      renderBtn.disabled = !canRender;
      renderBtnText.textContent = hasFilm ? 'FILM NEU MIT ALLEN' : 'FILM ERSTELLEN';
      renderBadge.textContent = renderCount > 0 ? `· ${renderCount} / ${maxRenders}` : '';
      renderBtn.addEventListener('click', () => triggerRender(event, completedCount >= 1));
    }

    // Share-to-Honoree Button
    const shareHonoreeBtn = document.getElementById('v3-share-to-honoree-btn');
    if (shareHonoreeBtn && event.guest_of_honor) {
      shareHonoreeBtn.disabled = !hasFilm;
      shareHonoreeBtn.addEventListener('click', () => shareToHonoree(event));
    }

    // Wizard-Link copy
    const wizLinkBtn = document.getElementById('v3-wizard-link-btn');
    if (wizLinkBtn) {
      wizLinkBtn.addEventListener('click', async () => {
        const wizUrl = `${location.origin}${location.pathname}?event=${event.id}`;
        try {
          await navigator.clipboard.writeText(wizUrl);
          setFeedback('v3-action-feedback', `<p class="font-tech text-[10px] text-primary uppercase tracking-[0.15em]">GAST_LINK_KOPIERT ✓</p>`, 3000);
        } catch { setFeedback('v3-action-feedback', `<p class="font-tech text-[10px] text-error uppercase">CLIPBOARD_FAIL · ${esc(wizUrl)}</p>`); }
      });
    }
  }

  function setFeedback(id, html, clearAfter = 0) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = html;
    if (clearAfter > 0) setTimeout(() => { if (el) el.innerHTML = ''; }, clearAfter);
  }

  async function triggerRender(event, hasGuests) {
    const force = !!event.auto_render_triggered_at; // Already triggered once → force=true
    setFeedback('v3-action-feedback', '<p class="font-tech text-[10px] text-primary uppercase animate-pulse">TRIGGERING_AUTO_RENDER...</p>');
    try {
      const resp = await fetch(AUTO_RENDER_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'apikey': SUPABASE_KEY,
        },
        body: JSON.stringify({ event_id: event.id, force, creator_name: event.created_by }),
      });
      const data = await resp.json();
      if (data.triggered) {
        setFeedback('v3-action-feedback', `<p class="font-tech text-[10px] text-primary uppercase">RENDER_STARTED · ${data.faces_used} FACES · ${data.stories_provided} STORIES · ${data.render_count}/${data.max} RUNS</p>`, 8000);
        // Reload after 3s to reflect triggered_at
        setTimeout(() => loadAndRenderEventView(event), 3000);
      } else {
        setFeedback('v3-action-feedback', `<p class="font-tech text-[10px] text-error uppercase">${esc(data.reason || 'FAIL')} · ${esc(JSON.stringify(data).slice(0, 200))}</p>`, 8000);
      }
    } catch (err) {
      setFeedback('v3-action-feedback', `<p class="font-tech text-[10px] text-error uppercase">NETWORK_ERROR · ${esc(err.message || err)}</p>`, 8000);
    }
  }

  async function shareToHonoree(event) {
    // Ensure we have fresh share_token
    const { data: fresh } = await sb.from('kreis_events').select('share_token, guest_of_honor').eq('id', event.id).single();
    const token = fresh?.share_token;
    if (!token) { setFeedback('v3-action-feedback', '<p class="font-tech text-[10px] text-error uppercase">NO_SHARE_TOKEN</p>'); return; }
    const honoreeUrl = `${location.origin}${location.pathname}?token=${token}`;
    const msg = `Für dich. Von mir und ein paar Freunden.\n\n${honoreeUrl}`;
    const waUrl = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    try { await navigator.clipboard.writeText(honoreeUrl); } catch {}
    setFeedback('v3-action-feedback', `
      <div class="glass-panel rounded-2xl p-4 mt-2">
        <p class="font-tech text-[10px] text-primary uppercase mb-2">SHARE_LINK_READY</p>
        <p class="text-sm text-on-surface-variant mb-3">Link ist in der Zwischenablage. Oder direkt per WhatsApp:</p>
        <div class="flex gap-2 flex-wrap">
          <a href="${esc(waUrl)}" target="_blank" rel="noopener" class="bg-[#25D366] text-white rounded-full px-5 py-2.5 font-tech text-[10px] uppercase tracking-[0.15em]">WhatsApp öffnen</a>
          <code class="font-tech text-[9px] text-on-surface-variant/60 break-all px-2 py-1">${esc(honoreeUrl)}</code>
        </div>
      </div>`, 60000);
  }

  async function castVote(eventId, vote) {
    const name = document.getElementById('my-name').value.trim();
    const note = document.getElementById('my-note').value.trim() || null;
    const fb = document.getElementById('vote-feedback');
    if (!name) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Bitte deinen Namen eintragen.</div>';
      return;
    }
    setName(name);
    const { error } = await sb.from('kreis_responses').upsert({ event_id: eventId, user_name: name, response: vote, note }, { onConflict: 'event_id,user_name' });
    if (error) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Fehler: ${esc(error.message)}</div>`;
      return;
    }
    fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Danke. Gespeichert.</div>';
    setTimeout(async () => {
      const { data: fresh } = await sb.from('kreis_events').select('*').eq('id', eventId).single();
      if (fresh) await loadAndRenderEventView(fresh);
    }, 700);
  }

  async function copyLink(url) {
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(url);
      btn.textContent = 'kopiert ✓';
      setTimeout(() => { btn.textContent = 'kopieren'; }, 1500);
    } catch {
      btn.textContent = 'Fehler';
    }
  }

  async function nativeShare(event, url) {
    const text = `${event.title}${event.location ? ` · ${event.location}` : ''}${event.date_start ? ` · ${formatDateRange(event.date_start, event.date_end)}` : ''}`;
    try {
      await navigator.share({ title: event.title, text, url });
    } catch (err) {
      if (err.name !== 'AbortError') console.warn('[KREIS] share:', err);
    }
  }

    `;

      fb.innerHTML = '';
      scheduleRefresh(event);

    document.getElementById('save-edit').addEventListener('click', async () => {

        title: document.getElementById('edit-title').value.trim(),
        location: document.getElementById('edit-location').value.trim() || null,
        date_start: document.getElementById('edit-date-start').value || null,

      if (!updated.title) {
        fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm mt-2">Titel ist Pflicht.</div>';
        return;
      }
      const { data, error } = await sb.from('kreis_events').update(updated).eq('id', event.id).select().single();
      if (error) {
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm mt-2">Fehler: ${esc(error.message)}</div>`;
        return;
      }
      updateMyEvent(data);
      await loadAndRenderEventView(data);
    });
  }

  // ============================
  // AI-EINLADUNG (Compose: Claude + 4× Gemini Pro parallel)
  // ============================
  const COMPOSE_URL = `${SUPABASE_URL}/functions/v1/kreis-compose-invite`;

  // Guest-State pro Event: [{name, height_cm, storage_path, signed_url, preview_url}]
  let composeGuests = [];

  function getGuestsKey(eventId) { return `kreis_compose_${eventId}`; }
  function loadGuests(eventId) {
    try { return JSON.parse(localStorage.getItem(getGuestsKey(eventId)) || '[]'); } catch { return []; }
  }
  function saveGuests(eventId, guests) {
    localStorage.setItem(getGuestsKey(eventId), JSON.stringify(
      guests.map(g => ({ name: g.name, height_cm: g.height_cm, storage_path: g.storage_path }))
    ));
  }

  async function initComposer(event) {
    const stored = loadGuests(event.id);
    // Ersten Gast = Event-Creator (Jürgen selbst) automatisch anlegen wenn leer
    if (stored.length === 0) {
      composeGuests = [{ name: getName() || event.created_by, height_cm: null, storage_path: null, signed_url: null, preview_url: null }];
    } else {
      composeGuests = stored.map(g => ({ ...g, signed_url: null, preview_url: null }));
      // Signed URLs für bestehende storage_paths refreshen
      for (const g of composeGuests) {
        if (g.storage_path) {
          const { data } = await sb.storage.from('kreis-faces').createSignedUrl(g.storage_path, 3600);
          if (data?.signedUrl) {
            g.signed_url = data.signedUrl;
            g.preview_url = data.signedUrl;
          }
        }
      }
    }
    renderGuests(event);

    // Check ob schon komponierte Einladungen existieren
    const { data: gens } = await sb.from('kreis_generated')
      .select('*')
      .eq('event_id', event.id)
      .eq('kind', 'scene_image')
      .order('created_at', { ascending: false })
      .limit(4);
    if (gens && gens.length === 4) {
      // Zeige letzte 4 Szenen — gleich Run gruppiert by compose_run oder letzte 4
      renderComposeResult({
        description: '',
        song_hook: '',
        scenes: gens.reverse().map((g, i) => ({
          title: g.meta?.scene_title || `Szene ${i + 1}`,
          image_url: g.url,
        })),
      });
    }

    document.getElementById('add-guest-btn')?.addEventListener('click', () => {
      if (composeGuests.length >= 4) return;
      composeGuests.push({ name: '', height_cm: null, storage_path: null, signed_url: null, preview_url: null });
      renderGuests(event);
    });

    document.getElementById('compose-btn')?.addEventListener('click', () => composeInvite(event));
  }

  function renderGuests(event) {
    const list = document.getElementById('guests-list');
    if (!list) return;
    list.innerHTML = composeGuests.map((g, idx) => `
      <div class="bg-surface-high rounded-2xl p-3 flex items-start gap-3">
        <label class="cursor-pointer shrink-0">
          <input type="file" class="hidden" accept="image/jpeg,image/png,image/webp,image/heic" data-guest-idx="${idx}">
          ${g.preview_url ? `
            <img src="${esc(g.preview_url)}" alt="${esc(g.name)}" class="w-16 h-16 rounded-xl object-cover ring-2 ring-primary-container/30">
          ` : `
            <div class="w-16 h-16 rounded-xl bg-surface-highest border-2 border-dashed border-outline-variant/40 flex items-center justify-center hover:border-primary-container/50 transition-colors">
              <span class="material-symbols-outlined text-[20px] text-on-surface-variant">add_a_photo</span>
            </div>
          `}
        </label>
        <div class="flex-1 min-w-0 flex flex-col gap-2">
          <input type="text" placeholder="Name" value="${esc(g.name)}" data-guest-name-idx="${idx}" class="w-full bg-surface-highest rounded-xl border border-outline-variant/20 px-3 py-2 text-sm focus:border-primary-container/50 focus:ring-0">
          <div class="flex items-center gap-2">
            <input type="number" placeholder="cm" min="100" max="230" value="${g.height_cm || ''}" data-guest-height-idx="${idx}" class="w-20 bg-surface-highest rounded-xl border border-outline-variant/20 px-3 py-2 text-sm focus:border-primary-container/50 focus:ring-0">
            <span class="text-xs text-on-surface-variant">Größe (optional, verbessert Proportionen)</span>
            ${idx > 0 ? `<button data-guest-remove-idx="${idx}" class="ml-auto text-xs text-on-surface-variant hover:text-error">✕</button>` : ''}
          </div>
        </div>
      </div>
    `).join('');

    // File-Upload-Listeners
    list.querySelectorAll('input[type="file"][data-guest-idx]').forEach(input => {
      input.addEventListener('change', (e) => handleGuestFaceUpload(e, parseInt(input.dataset.guestIdx), event));
    });
    list.querySelectorAll('input[data-guest-name-idx]').forEach(input => {
      input.addEventListener('input', () => {
        composeGuests[parseInt(input.dataset.guestNameIdx)].name = input.value.trim();
        updateComposeBtn();
      });
    });
    list.querySelectorAll('input[data-guest-height-idx]').forEach(input => {
      input.addEventListener('input', () => {
        const v = parseInt(input.value);
        composeGuests[parseInt(input.dataset.guestHeightIdx)].height_cm = Number.isFinite(v) ? v : null;
        saveGuests(event.id, composeGuests);
      });
    });
    list.querySelectorAll('button[data-guest-remove-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        composeGuests.splice(parseInt(btn.dataset.guestRemoveIdx), 1);
        saveGuests(event.id, composeGuests);
        renderGuests(event);
        updateComposeBtn();
      });
    });

    // Add-Guest-Button (max 4)
    const addBtn = document.getElementById('add-guest-btn');
    if (addBtn) addBtn.style.display = composeGuests.length >= 4 ? 'none' : '';

    updateComposeBtn();
  }

  function updateComposeBtn() {
    const btn = document.getElementById('compose-btn');
    const btnText = document.getElementById('compose-btn-text');
    if (!btn || !btnText) return;
    const withFaces = composeGuests.filter(g => g.signed_url && g.name).length;
    if (withFaces === 0) {
      btn.disabled = true;
      btnText.textContent = 'Erst mind. 1 Gesicht + Name';
    } else {
      btn.disabled = false;
      btnText.textContent = `✨ Volle Einladung komponieren (${withFaces} ${withFaces === 1 ? 'Person' : 'Personen'})`;
    }
  }

  async function handleGuestFaceUpload(e, idx, event) {
    const file = e.target.files?.[0];
    if (!file) return;
    const fb = document.getElementById('compose-feedback');
    if (file.size > 8 * 1024 * 1024) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Foto ist größer als 8 MB.</div>';
      return;
    }

    const guest = composeGuests[idx];
    const name = guest.name || `gast${idx}`;
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z]/g, '').slice(0, 4) || 'jpg';
    const safeName = name.toLowerCase().replace(/[^a-z0-9]/g, '-') || 'gast';
    const path = `${event.id}/${safeName}-${Date.now()}.${ext}`;

    fb.innerHTML = '<div class="text-on-surface-variant text-sm px-1">lade hoch…</div>';

    const { error: upErr } = await sb.storage.from('kreis-faces').upload(path, file, {
      contentType: file.type, upsert: true,
    });
    if (upErr) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Upload: ${esc(upErr.message)}</div>`;
      return;
    }

    const { data: signed } = await sb.storage.from('kreis-faces').createSignedUrl(path, 7200);
    if (!signed?.signedUrl) {
      fb.innerHTML = '<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Signed-URL-Fehler.</div>';
      return;
    }

    guest.storage_path = path;
    guest.signed_url = signed.signedUrl;
    guest.preview_url = signed.signedUrl;

    saveGuests(event.id, composeGuests);
    renderGuests(event);

    fb.innerHTML = '<div class="bg-yes/10 border border-yes/30 text-yes rounded-2xl px-4 py-3 text-sm">Foto ok.</div>';
    setTimeout(() => { fb.innerHTML = ''; }, 1500);
  }

  async function composeInvite(event) {
    // Frozen snapshot gegen Race (User editiert während fetch)
    const valid = Object.freeze(composeGuests.filter(g => g.signed_url && g.name).map(g => ({
      signed_url: g.signed_url, name: g.name, height_cm: g.height_cm,
    })));
    if (valid.length === 0) return;

    const fb = document.getElementById('compose-feedback');
    const btn = document.getElementById('compose-btn');
    const btnText = document.getElementById('compose-btn-text');
    const result = document.getElementById('compose-result');

    btn.disabled = true;
    btnText.innerHTML = 'Claude denkt… Gemini Pro generiert 4 Szenen… (~30-60 Sek)';
    fb.innerHTML = '<div class="bg-surface-highest rounded-2xl px-4 py-3 text-sm flex items-center gap-2"><span class="sparkle-pulse">✨</span><span>Das kann bis zu einer Minute dauern. Bleib da.</span></div>';

    // Heights: nur senden wenn ALLE gesetzt sind (sonst undefined)
    const heights = valid.map(g => g.height_cm);
    const allHeights = heights.every(h => typeof h === 'number' && h > 0);

    try {
      const resp = await fetch(COMPOSE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
        },
        body: JSON.stringify({
          event_id: event.id,
          face_urls: valid.map(g => g.signed_url),
          user_names: valid.map(g => g.name),
          user_heights_cm: allHeights ? heights : undefined,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">${esc(err.detail || err.error || 'unbekannt')}</div>`;
        btn.disabled = false;
        btnText.textContent = '✨ Nochmal versuchen';
        return;
      }

      const plan = await resp.json();
      fb.innerHTML = '';
      renderComposeResult(plan);
      btn.disabled = false;
      btnText.textContent = '✨ Neu komponieren';
    } catch (err) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Netz-Fehler: ${esc(err.message || err)}</div>`;
      btn.disabled = false;
      btnText.textContent = '✨ Nochmal versuchen';
    }
  }

  function scoreBadge(score) {
    if (score == null) return '';
    const color = score >= 8 ? 'bg-yes/20 text-yes border-yes/40'
                : score >= 6 ? 'bg-primary-container/20 text-primary-container border-primary-container/40'
                : score >= 4 ? 'bg-maybe/20 text-maybe border-maybe/40'
                :              'bg-no/20 text-no border-no/40';
    const stars = '★'.repeat(Math.round(score / 2)) + '☆'.repeat(5 - Math.round(score / 2));
    return `<span class="absolute top-2 right-2 ${color} border backdrop-blur text-[10px] font-medium px-2 py-1 rounded-full" title="Identity-Score: ${score}/10">${stars} ${score}</span>`;
  }

  function renderComposeResult(plan) {
    const result = document.getElementById('compose-result');
    if (!result) return;
    const allScenes = plan.scenes || [];
    // shown === true: Identity-Check bestanden. Default: zeige nicht (strict)
    const shown = allScenes.filter(s => s.image_url && s.shown === true);
    const hidden = allScenes.filter(s => s.image_url && s.shown !== true);
    const failed = allScenes.filter(s => !s.image_url);

    result.innerHTML = `
      ${plan.description ? `
        <div class="bg-surface-high rounded-2xl p-4 mb-4">
          <h3 class="text-on-surface-variant text-xs font-semibold tracking-widest uppercase mb-2">Einladungstext</h3>
          <p class="text-sm leading-relaxed">${esc(plan.description)}</p>
          ${plan.song_hook ? `<p class="text-xs text-primary-container italic mt-2 pt-2 border-t border-outline-variant/15">🎵 Song-Hook: „${esc(plan.song_hook)}"</p>` : ''}
        </div>
      ` : ''}

      ${plan.avg_identity_score != null ? `
        <div class="flex items-center gap-2 mb-3 text-xs text-on-surface-variant">
          <span class="material-symbols-outlined text-[16px]">verified</span>
          <span>Identity-Check: <strong class="text-on-surface">${plan.shown_count || shown.length}/${allScenes.length}</strong> bestanden · Ø <strong class="text-on-surface">${plan.avg_identity_score}/10</strong></span>
        </div>
      ` : ''}

      ${shown.length === 0 ? `
        <div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">
          Keine Szene hat den Identity-Check bestanden. Versuch's mit mehr / besseren Referenzfotos.
        </div>
      ` : `
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          ${shown.map(s => `
            <div class="bg-surface-high rounded-2xl overflow-hidden">
              <div class="relative">
                <img src="${esc(s.image_url)}" alt="${esc(s.title)}" class="w-full aspect-[3/4] object-cover">
                <span class="absolute bottom-2 left-2 bg-black/60 backdrop-blur text-white text-[11px] font-medium px-2 py-1 rounded-full">${esc(s.title)}</span>
                ${scoreBadge(s.identity_score)}
              </div>
              <div class="flex gap-2 p-2">
                <a href="${esc(s.image_url)}" target="_blank" rel="noopener" class="flex-1 bg-surface-highest hover:bg-surface-bright text-[11px] font-medium rounded-xl py-2 transition-colors text-center">öffnen</a>
                <button data-share-url="${esc(s.image_url)}" class="share-scene-btn flex-1 bg-primary-container/20 hover:bg-primary-container/30 text-primary-container text-[11px] font-medium rounded-xl py-2 transition-colors">teilen</button>
              </div>
              ${Array.isArray(s.issues) && s.issues.length && s.identity_score < 8 ? `
                <div class="px-2 pb-2 text-[10px] text-on-surface-variant italic">${esc(s.issues.slice(0, 2).join(' · '))}</div>
              ` : ''}
            </div>
          `).join('')}
        </div>
      `}

      ${(hidden.length > 0 || failed.length > 0) ? `
        <details class="mt-4 text-xs text-on-surface-variant">
          <summary class="cursor-pointer hover:text-on-surface">${hidden.length + failed.length} Szenen ausgefiltert (Identity zu schwach oder Fehler)</summary>
          <ul class="mt-2 space-y-1 ml-4">
            ${hidden.map(s => `<li>• <strong>${esc(s.title)}</strong> — Score ${s.identity_score}/10 (${esc((s.issues || []).join('; ').slice(0, 120))})</li>`).join('')}
            ${failed.map(s => `<li>• <strong>${esc(s.title)}</strong> — Fehler: ${esc((s.error || 'unknown').slice(0, 120))}</li>`).join('')}
          </ul>
        </details>
      ` : ''}
    `;

    result.querySelectorAll('.share-scene-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const url = btn.dataset.shareUrl;
        if ('share' in navigator) {
          try { await navigator.share({ url, title: 'KREIS Einladung' }); }
          catch (e) { if (e.name !== 'AbortError') navigator.clipboard?.writeText(url); }
        } else {
          navigator.clipboard?.writeText(url);
          btn.textContent = 'Link kopiert ✓';
          setTimeout(() => { btn.textContent = 'teilen'; }, 1500);
        }
      });
    });
  }

  function confirmDelete(event) {
    if (refreshTimer) clearInterval(refreshTimer);
    const fb = document.getElementById('action-feedback');
    fb.innerHTML = `
      <div class="bg-error/10 border border-error/30 rounded-2xl p-4 mt-2">
        <p class="text-error text-sm mb-3">Sicher? Das Event und alle Antworten werden gelöscht. Nicht rückgängig machbar.</p>
        <div class="grid grid-cols-2 gap-2">
          <button id="cancel-delete" class="bg-surface-highest hover:bg-surface-bright text-sm rounded-xl py-2.5 transition-colors">Doch nicht</button>
          <button id="do-delete" class="bg-error/80 hover:bg-error text-on-surface text-sm font-medium rounded-xl py-2.5 transition-colors">Ja, löschen</button>
        </div>
      </div>
    `;
    document.getElementById('cancel-delete').addEventListener('click', () => { fb.innerHTML = ''; scheduleRefresh(event); });
    document.getElementById('do-delete').addEventListener('click', async () => {
      const { error } = await sb.from('kreis_events').delete().eq('id', event.id);
      if (error) {
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm mt-2">Fehler: ${esc(error.message)}</div>`;
        return;
      }
      removeMyEvent(event.id);
      location.href = '?';
    });
  }

  // ============================
  // SONG-PIPELINE
  // ============================
  const SONG_URL = `${SUPABASE_URL}/functions/v1/kreis-compose-song`;

  let songPollInterval = null;

  async function initSongSection(event) {
    const btn = document.getElementById('song-btn');
    if (!btn) return;
    btn.addEventListener('click', () => composeSong(event));

    const row = await loadLatestSong(event.id);
    if (row) {
      renderSongResult(songRowToData(row));
      if (!row.url && row.meta?.suno_status === 'generating') {
        startSongPolling(event);
      }
    }
  }

  async function loadLatestSong(eventId) {
    const { data } = await sb.from('kreis_generated')
      .select('*')
      .eq('event_id', eventId)
      .eq('kind', 'song')
      .order('created_at', { ascending: false })
      .limit(1);
    return data?.[0] || null;
  }

  function songRowToData(row) {
    const m = row.meta || {};
    return {
      lyrics: m.lyrics || '',
      style_of_music: m.style_of_music || '',
      song_title: m.song_title || 'Song',
      suno_status: m.suno_status || (row.url ? 'done' : 'no_api_key'),
      suno_task_id: m.suno_task_id,
      audio_url: row.url || m.suno_tracks?.[0]?.audio_url || null,
      image_url: m.image_url || m.suno_tracks?.[0]?.image_url || null,
      alt_audio_url: m.alt_audio_url || m.suno_tracks?.[1]?.audio_url || null,
      duration_sec: m.duration_sec,
    };
  }

  function startSongPolling(event) {
    if (songPollInterval) clearInterval(songPollInterval);
    let attempts = 0;
    const MAX_ATTEMPTS = 40; // 10 Min (40 × 15s)
    songPollInterval = setInterval(() => {
      attempts++;
      if (attempts > MAX_ATTEMPTS) {
        clearInterval(songPollInterval);
        songPollInterval = null;
        return;
      }
      // Error-Handling: async-in-setInterval braucht try/catch
      (async () => {
        try {
          const row = await loadLatestSong(event.id);
          if (row && (row.url || row.meta?.suno_status === 'done')) {
            clearInterval(songPollInterval);
            songPollInterval = null;
            renderSongResult(songRowToData(row));
          }
        } catch (err) {
          console.warn('[kreis] song-poll error:', err);
        }
      })();
    }, 15000);
  }

  async function composeSong(event) {
    const btn = document.getElementById('song-btn');
    const btnText = document.getElementById('song-btn-text');
    const fb = document.getElementById('song-feedback');

    btn.disabled = true;
    btnText.textContent = 'Claude schreibt Lyrics…';
    fb.innerHTML = '<div class="bg-surface-highest rounded-2xl px-4 py-3 text-sm flex items-center gap-2"><span>🎵</span><span>Dauert ein paar Sekunden…</span></div>';

    const styleHint = document.getElementById('style-hint-input')?.value.trim() || undefined;
    const guestNames = composeGuests.filter(g => g.name).map(g => g.name);

    try {
      const resp = await fetch(SONG_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'apikey': SUPABASE_KEY,
        },
        body: JSON.stringify({
          event_id: event.id,
          guest_names: guestNames.length > 0 ? guestNames : undefined,
          style_hint: styleHint,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
        fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">${esc(err.detail || err.error || 'Fehler')}</div>`;
        btn.disabled = false;
        btnText.textContent = '🎵 Nochmal versuchen';
        return;
      }

      const data = await resp.json();
      fb.innerHTML = '';
      renderSongResult(data);
      btn.disabled = false;
      btnText.textContent = '🎵 Neue Lyrics generieren';
      // Start Polling falls Suno noch generiert
      if (data.suno_status === 'generating') {
        startSongPolling(event);
      }
    } catch (err) {
      fb.innerHTML = `<div class="bg-error/10 border border-error/30 text-error rounded-2xl px-4 py-3 text-sm">Netz-Fehler: ${esc(err.message || err)}</div>`;
      btn.disabled = false;
      btnText.textContent = '🎵 Nochmal versuchen';
    }
  }

  function renderSongResult(data) {
    const result = document.getElementById('song-result');
    if (!result) return;

    const lyrics = data.lyrics || '';
    const style = data.style_of_music || '';
    const title = data.song_title || 'Song';
    const sunoStatus = data.suno_status || 'no_api_key';
    const audioUrl = data.audio_url;
    const altAudioUrl = data.alt_audio_url;
    const imageUrl = data.image_url;
    const durationSec = data.duration_sec;

    const formattedLyrics = esc(lyrics)
      .replace(/\[(.*?)\]/g, '<span class="text-[#f59e0b] font-semibold">[$1]</span>')
      .replace(/\n/g, '<br>');

    const mmss = (s) => {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const ss = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${ss}`;
    };

    result.innerHTML = `
      <div class="bg-surface-high rounded-2xl p-4">
        ${audioUrl ? `
          <div class="flex gap-3 mb-4">
            ${imageUrl ? `
              <img src="${esc(imageUrl)}" alt="Cover" class="w-20 h-20 rounded-xl object-cover shrink-0 shadow-lg">
            ` : `
              <div class="w-20 h-20 rounded-xl bg-gradient-to-br from-[#f59e0b] to-[#ef4444] flex items-center justify-center shrink-0 shadow-lg">
                <span class="text-3xl">🎵</span>
              </div>
            `}
            <div class="flex-1 min-w-0 flex flex-col justify-center">
              <h3 class="font-medium text-sm truncate">${esc(title)}</h3>
              <p class="text-xs text-on-surface-variant truncate">${esc(style)}</p>
              ${durationSec ? `<p class="text-[11px] text-on-surface-variant mt-0.5">${mmss(durationSec)} · Suno V4</p>` : ''}
            </div>
          </div>
          <audio id="song-player" controls preload="none" class="w-full mb-3" style="height:44px">
            <source src="${esc(audioUrl)}" type="audio/mpeg">
          </audio>
          <div class="flex gap-2 mb-3 flex-wrap">
            ${altAudioUrl ? `
              <button id="toggle-variant-btn" data-main="${esc(audioUrl)}" data-alt="${esc(altAudioUrl)}" class="flex-1 bg-surface-highest hover:bg-surface-bright text-xs font-medium rounded-xl py-2 transition-colors border border-outline-variant/20 flex items-center justify-center gap-1.5">
                <span class="material-symbols-outlined text-[14px]">swap_horiz</span>
                <span id="variant-label">Variante 2</span>

  async function initFilmSection(event) {
    const btn = document.getElementById('film-btn');
    const btnText = document.getElementById('film-btn-text');
    const status = document.getElementById('film-status');
    const actions = document.getElementById('film-actions');
    if (!btn) return;

    // Scenes + Song aus DB holen
    const [{ data: scenes }, song] = await Promise.all([
      sb.from('kreis_generated')
        .select('url, meta, created_at')
        .eq('event_id', event.id)
        .eq('kind', 'scene_image')
        .not('url', 'is', null)
        .order('created_at', { ascending: false })
        .limit(8),
      loadLatestSong(event.id),
    ]);

    const latestScenes = (scenes || []).slice(0, 4).reverse();
    const songRow = song;
    const audioUrl = songRow?.url || songRow?.meta?.suno_tracks?.[0]?.audio_url;

    filmAssets = {
      scenes: latestScenes,
      song: songRow && audioUrl ? { ...songRow, audio_url: audioUrl } : null,
    };

    const missing = [];
    if (latestScenes.length < 4) missing.push(`${4 - latestScenes.length} AI-Szene${4 - latestScenes.length === 1 ? '' : 'n'}`);
    if (!filmAssets.song) missing.push('Song');

    if (missing.length) {
      btn.disabled = true;
      btnText.textContent = `Fehlt: ${missing.join(', ')}`;
      status.innerHTML = `<p class="text-xs text-on-surface-variant mb-3">Erstelle erst AI-Einladung oben, dann Song — dann ist der Film spielbar.</p>`;
    } else {
      btn.disabled = false;
      btnText.textContent = '🎬 Film abspielen';
      actions.classList.remove('hidden');
    }

    btn.onclick = () => playFilm(event);
    document.getElementById('film-share-btn')?.addEventListener('click', () => shareFilmLink(event));
    document.getElementById('film-export-btn')?.addEventListener('click', () => exportFilmAsMP4(event));

  function playFilm(event) {
    if (!filmAssets.scenes.length || !filmAssets.song) return;

    const modal = document.createElement('div');
    modal.className = 'film-modal';
    modal.setAttribute('role', 'dialog');
    modal.setAttribute('aria-modal', 'true');
    modal.setAttribute('aria-label', 'Einladungs-Film Player');
    modal.tabIndex = -1;
    modal.innerHTML = `
      <div class="film-stage">
        <div class="film-progress" id="film-progress"></div>
        ${filmAssets.scenes.map((s, i) => `
          <div class="film-slide${i === 0 ? ' active' : ''}" data-idx="${i}"
               style="background-image:url('${esc(s.url)}')"></div>
        `).join('')}
        <div class="film-caption" id="film-caption"></div>
        <button class="film-close" aria-label="Film schließen">✕</button>
      </div>
      <p class="film-hint" id="film-hint">Film startet… Ton einschalten am Handy!</p>
      <audio id="film-audio" preload="metadata" playsinline>
        <source src="${esc(filmAssets.song.audio_url)}" type="audio/mpeg">
      </audio>
    `;
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';

    const slides = modal.querySelectorAll('.film-slide');
    const audio = modal.querySelector('#film-audio');
    const caption = modal.querySelector('#film-caption');
    const progress = modal.querySelector('#film-progress');
    const hint = modal.querySelector('#film-hint');
    const closeBtn = modal.querySelector('.film-close');

    // Captions basierend auf Event-Daten
    const captions = [
      `${event.title || ''}`,
      event.location ? `📍 ${event.location}` : (event.date_start ? formatDate(event.date_start) : ''),
      filmAssets.song.meta?.song_title ? `🎵 ${filmAssets.song.meta.song_title}` : '',
      'Wer ist dabei?',
    ];

    // State + cleanup-handles (damit close() alle entfernen kann)
    const state = {
      slideInterval: null,
      captionTimeout: null,
      handlers: { keydown: null, timeupdate: null, ended: null, stageClick: null },
    };

    function showSlide(i) {
      slides.forEach(s => s.classList.remove('active'));
      slides[i]?.classList.add('active');
      caption.textContent = captions[i] || '';
      caption.classList.add('visible');
      if (state.captionTimeout) clearTimeout(state.captionTimeout);
      state.captionTimeout = setTimeout(() => caption.classList.remove('visible'), 3500);
    }

    function startPlayback() {
      hint.textContent = 'spielt…';
      audio.play().then(() => {
        const totalDuration = audio.duration || 172;
        const slideDuration = totalDuration / slides.length;
        showSlide(0);
        let i = 0;
        state.slideInterval = setInterval(() => {
          i++;
          if (i >= slides.length) { clearInterval(state.slideInterval); state.slideInterval = null; return; }
          showSlide(i);
        }, slideDuration * 1000);

        state.handlers.timeupdate = () => {
          progress.style.width = `${(audio.currentTime / totalDuration) * 100}%`;
        };
        state.handlers.ended = () => {
          hint.textContent = 'Film zu Ende. ❤️';
          if (state.slideInterval) { clearInterval(state.slideInterval); state.slideInterval = null; }
        };
        audio.addEventListener('timeupdate', state.handlers.timeupdate);
        audio.addEventListener('ended', state.handlers.ended);
      }).catch(() => {
        hint.innerHTML = '<span style="color:#f59e0b">⚠️ Autoplay blockiert. Tippe auf den Film zum Starten.</span>';
        state.handlers.stageClick = () => {
          audio.play().then(startPlayback).catch(() => {});
        };
        modal.querySelector('.film-stage').addEventListener('click', state.handlers.stageClick, { once: true });
      });
    }

    // Clean shutdown — entfernt alle Listener + Intervals
    const close = () => {
      if (state.slideInterval) clearInterval(state.slideInterval);
      if (state.captionTimeout) clearTimeout(state.captionTimeout);
      try { audio.pause(); } catch {}
      if (state.handlers.timeupdate) audio.removeEventListener('timeupdate', state.handlers.timeupdate);
      if (state.handlers.ended) audio.removeEventListener('ended', state.handlers.ended);
      if (state.handlers.keydown) document.removeEventListener('keydown', state.handlers.keydown);
      audio.src = '';  // stop buffering
      document.body.style.overflow = '';
      modal.remove();
    };

    closeBtn.addEventListener('click', close);
    state.handlers.keydown = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', state.handlers.keydown);

    // Focus-Trap: Close-Button kriegt initial Focus (für Keyboard-User)
    setTimeout(() => closeBtn.focus(), 50);

    // Playback startet sofort (setTimeout-Hack entfernt)
    startPlayback();
  }

  async function shareFilmLink(event) {
    const filmUrl = `${location.origin}${location.pathname}?event=${event.id}&view=film`;
    const text = `🎬 ${event.title || 'KREIS-Einladung'} — schau dir unseren Einladungs-Film an:\n${filmUrl}`;
    if ('share' in navigator) {
      try { await navigator.share({ title: event.title, text, url: filmUrl }); }
      catch (e) {
        if (e.name !== 'AbortError') navigator.clipboard?.writeText(filmUrl);
      }
    } else {
      await navigator.clipboard?.writeText(filmUrl);
      const btn = document.getElementById('film-share-btn');
      if (btn) {
        const orig = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">check</span><span>Link kopiert ✓</span>';
        setTimeout(() => { btn.innerHTML = orig; }, 1500);
      }
    }
  }

  async function exportFilmAsMP4(event) {
    const btn = document.getElementById('film-export-btn');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">hourglass_top</span><span>lade ffmpeg.wasm (24 MB)…</span>';

    try {
      // Load ffmpeg.wasm scripts once (with timeout)
      const loadScript = (src) => new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`Script load failed: ${src}`));
        document.head.appendChild(s);
        setTimeout(() => reject(new Error('Script timeout')), 60000);
      });

      if (!window.FFmpegWASM) {
        await loadScript('https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js');
        await loadScript('https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js');
      }

      // In ffmpeg@0.12.x ist der Global-Export `window.FFmpegWASM`
      const FFmpegCtor = window.FFmpegWASM?.FFmpeg || window.FFmpeg?.FFmpeg;
      if (!FFmpegCtor) throw new Error('ffmpeg.wasm konnte nicht geladen werden');
      const ffmpeg = new FFmpegCtor();
      btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">download</span><span>ffmpeg core (~24 MB)…</span>';
      await ffmpeg.load({
        coreURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',
        wasmURL: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm',
      });

      btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">image</span><span>Assets parallel laden…</span>';
      // PARALLEL: 4 Bilder + 1 Song via Promise.all (spart ~4s bei 1MB/Asset)
      const [imageBuffers, songBuf] = await Promise.all([
        Promise.all(filmAssets.scenes.map(async (s) => {
          const resp = await fetch(s.url);
          return new Uint8Array(await resp.arrayBuffer());
        })),
        fetch(filmAssets.song.audio_url).then(r => r.arrayBuffer()).then(b => new Uint8Array(b)),
      ]);
      // Write in ffmpeg virtual FS
      for (let i = 0; i < imageBuffers.length; i++) {
        await ffmpeg.writeFile(`img${i}.jpg`, imageBuffers[i]);
      }
      await ffmpeg.writeFile('song.mp3', songBuf);

      btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">movie</span><span>rendere MP4 (1-3 Min)…</span>';
      // Concat 4 images with Ken-Burns to video, sync with audio, fade transitions
      const sceneSec = 43;
      await ffmpeg.exec([
        '-loop', '1', '-t', String(sceneSec), '-i', 'img0.jpg',
        '-loop', '1', '-t', String(sceneSec), '-i', 'img1.jpg',
        '-loop', '1', '-t', String(sceneSec), '-i', 'img2.jpg',
        '-loop', '1', '-t', String(sceneSec), '-i', 'img3.jpg',
        '-i', 'song.mp3',
        '-filter_complex',
          `[0:v]scale=720:960,fade=t=out:st=${sceneSec-1}:d=1[v0];` +
          `[1:v]scale=720:960,fade=t=in:st=0:d=1,fade=t=out:st=${sceneSec-1}:d=1[v1];` +
          `[2:v]scale=720:960,fade=t=in:st=0:d=1,fade=t=out:st=${sceneSec-1}:d=1[v2];` +
          `[3:v]scale=720:960,fade=t=in:st=0:d=1[v3];` +
          `[v0][v1][v2][v3]concat=n=4:v=1:a=0[vout]`,
        '-map', '[vout]', '-map', '4:a',
        '-c:v', 'libx264', '-r', '24', '-pix_fmt', 'yuv420p',
        '-c:a', 'aac', '-shortest', '-y', 'out.mp4',
      ]);

      btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">download</span><span>Download…</span>';
      const data = await ffmpeg.readFile('out.mp4');
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `kreis-${(event.title || 'film').toLowerCase().replace(/[^a-z0-9]+/g, '-')}.mp4`;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 15000);

      btn.disabled = false;
      btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">check_circle</span><span>MP4 erstellt ✓</span>';
      setTimeout(() => {
        btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">movie</span><span>Als MP4 (1-3 Min)</span>';
      }, 3000);
    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = `<span class="material-symbols-outlined text-[14px]">error</span><span>Fehler: ${esc(String(err.message || err).slice(0, 40))}</span>`;
      setTimeout(() => {
        btn.innerHTML = '<span class="material-symbols-outlined text-[14px]">movie</span><span>Nochmal versuchen</span>';
      }, 4000);
    }
  }
